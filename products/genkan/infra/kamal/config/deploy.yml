# Genkan (genkan.iedora.com) — Kamal 2 deploy onto the same homelab box menu
# uses. Genkan owns ALL identity primitives (users, orgs, sessions, OAuth
# clients, grants) in a DEDICATED Postgres DATABASE (`genkan`) on the SHARED
# Postgres INSTANCE menu also uses. One server process, two independent
# databases — no cross-database queries possible (Postgres enforces this).
# Federation between products happens via OIDC, not via SQL.

<%
  public_hostname = ENV.fetch("PUBLIC_HOSTNAME")
  # Trusted-origin pattern: menu.<apex>. Add more first-party products here
  # as they come online (or expose this via env if it gets crowded).
  menu_origin = "https://menu.#{public_hostname.split('.', 2)[1]}"
%>

service: genkan

image: <%= ENV.fetch("GHCR_USER") %>/genkan

servers:
  web:
    hosts:
      - <%= ENV.fetch("ONPREM_HOST") %>
    # Run Drizzle migrations (auth.* schema) before starting the server.
    # Same lock pattern as menu — scripts/migrate.mjs holds a pg_advisory_lock
    # so concurrent boots (genkan + menu running their own migrations) don't
    # collide.
    cmd: sh -c "node scripts/migrate.mjs && node server.js"
    # Kamal auto-attaches every app container to the shared `kamal` Docker
    # network (same one kamal-proxy + meta-menu-postgres live on). No extra
    # network: directive needed — adding `options.network: kamal` would
    # cause `--network kamal` to appear twice in `docker run` and fail.
    # Genkan reaches Postgres at `meta-menu-postgres:5432` automatically.

proxy:
  ssl: false                              # Cloudflare Tunnel terminates TLS
  host: <%= public_hostname %>
  app_port: 3000
  forward_headers: true                   # cloudflared sets X-Forwarded-*
  healthcheck:
    path: /up
    interval: 1
    timeout: 5
  buffering:
    requests: true
    responses: true

registry:
  server: ghcr.io
  username: <%= ENV.fetch("GHCR_USER") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: root

# Remote-only builder: SSH to the box and build there natively (amd64).
builder:
  arch: amd64
  remote: ssh://root@<%= ENV.fetch("ONPREM_HOST") %>
  local: false
  # Kamal runs from products/genkan/infra/kamal/. Build context is the REPO
  # ROOT (../../../..) so the Bun workspace lockfile + linked packages are
  # visible to the build.
  context: ../../../..
  # See products/menu/infra/kamal/config/deploy.yml for the rationale —
  # `dockerfile:` is resolved from Kamal's cwd, not the build context.
  dockerfile: ../Dockerfile

env:
  clear:
    NEXT_TELEMETRY_DISABLED: "1"
    BETTER_AUTH_URL: https://<%= public_hostname %>
    # No COOKIE_DOMAIN — products federate via OIDC now, not cross-subdomain
    # cookies. Each app gets a host-scoped cookie on its own domain.
    TRUSTED_ORIGINS: <%= menu_origin %>,https://<%= public_hostname %>
    # Where to land users when sign-in completes without a ?return_to.
    DEFAULT_RETURN_TO: <%= menu_origin %>/dashboard
  secret:
    - BETTER_AUTH_SECRET
    - DATABASE_URL
    - TRUSTED_CLIENTS

aliases:
  console: app exec --interactive --reuse bash
  logs: app logs -f
  migrate: app exec --reuse "node scripts/migrate.mjs"

accessories:
  # No postgres accessory here — genkan reuses the `meta-menu-postgres`
  # accessory owned by menu's Kamal config. They share the same Postgres
  # SERVER but each app uses a separate DATABASE (`metamenu` vs `genkan`).
  # genkan's scripts/migrate.mjs runs `CREATE DATABASE IF NOT EXISTS` style
  # bootstrap before applying its own migrations.

  # Cloudflare Tunnel — outbound only, terminates TLS at the edge.
  # Ingress (set via tofu apply): PUBLIC_HOSTNAME → http://kamal-proxy
  cloudflared:
    image: cloudflare/cloudflared:2026.5.0@sha256:59bab8d3aceec09bf6bdb07d6beca0225ca5cd7ab79436a87ea97978fe1dc4f9
    host: <%= ENV.fetch("ONPREM_HOST") %>
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - TUNNEL_TOKEN
