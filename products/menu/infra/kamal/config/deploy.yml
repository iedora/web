# Kamal 2 — single homelab box behind Cloudflare Tunnel.
#
# Build runs natively on the homelab box via `builder.remote: ssh://...`
# (amd64, no QEMU on the Mac). Image is pushed to GitHub Container Registry
# and pulled by the same box. Registry auth uses the `gh` CLI's token
# (see .kamal/secrets).

<%
  public_hostname = ENV.fetch("PUBLIC_HOSTNAME")
  # Assets live on `assets.<rest-of-public-hostname>` — e.g. menu.example.com → assets.example.com
  assets_hostname = "assets.#{public_hostname.split('.', 2)[1]}"
%>

service: meta-menu

image: <%= ENV.fetch("GHCR_USER") %>/meta-menu

servers:
  web:
    hosts:
      - <%= ENV.fetch("ONPREM_HOST") %>
    # Run Drizzle migrations before starting the server. Safe across multiple
    # replicas — scripts/migrate.mjs holds a pg_advisory_lock so only one
    # container actually migrates; others wait briefly then exit the lock.
    # Replaces a pre-deploy hook that didn't work on first deploy (Kamal pushes
    # the env file during boot, not before pre-deploy hooks fire).
    cmd: sh -c "node scripts/migrate.mjs && node server.js"

proxy:
  ssl: false                              # Cloudflare Tunnel terminates TLS
  host: <%= public_hostname %>
  app_port: 3000
  forward_headers: true                   # cloudflared sets X-Forwarded-*
  healthcheck:
    path: /up
    interval: 1
    timeout: 5
  buffering:
    requests: true
    responses: true
    max_request_body: 10_000_000          # image uploads cap ~5 MB client-side

registry:
  server: ghcr.io
  username: <%= ENV.fetch("GHCR_USER") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

# Kamal 2 canonical convention: root with SSH-key-only login. Kamal never
# runs `sudo`; `kamal server bootstrap` curls get.docker.com which needs
# root. Cloud VPS images ship with this exact setup by default.
ssh:
  user: root

# Remote-only builder: SSH to the box and build there natively (amd64).
# No buildx on the Mac, no QEMU, no source transfer over the WAN.
builder:
  arch: amd64
  remote: ssh://root@<%= ENV.fetch("ONPREM_HOST") %>
  local: false
  # Kamal runs from products/menu/infra/kamal/; both paths below are resolved
  # via File.expand_path against that cwd.
  #
  # Build context is the REPO ROOT (../../../..) so the Bun workspace lockfile
  # at /bun.lock + /packages/design-system are visible to the build.
  # The Dockerfile is referenced by its repo-relative path.
  context: ../../../..
  # `dockerfile:` is resolved from Kamal's cwd (products/menu/infra/kamal/),
  # NOT from the build context. Kamal converts it to an absolute path before
  # invoking docker, so docker can read a Dockerfile that sits outside the
  # build context root.
  dockerfile: ../Dockerfile

env:
  clear:
    NEXT_TELEMETRY_DISABLED: "1"
    BETTER_AUTH_URL: https://<%= public_hostname %>
    S3_ENDPOINT: https://<%= assets_hostname %>
    S3_REGION: us-east-1
    S3_BUCKET: metamenu
  secret:
    - BETTER_AUTH_SECRET
    - DATABASE_URL
    - S3_ACCESS_KEY
    - S3_SECRET_KEY

aliases:
  console: app exec --interactive --reuse bash
  logs: app logs -f
  migrate: app exec --reuse "node scripts/migrate.mjs"

# Accessories share the `kamal` Docker network with app + proxy — they reach
# each other by container name (e.g. meta-menu-postgres:5432). No `port: x:x`
# keys: Docker's NAT rules sit BEFORE host firewalls, so publishing a port
# bypasses UFW (basecamp/kamal#1790).
accessories:
  postgres:
    image: postgres:18.4-alpine
    host: <%= ENV.fetch("ONPREM_HOST") %>
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: metamenu
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql

  # Rate limiting + Better Auth's own throttle live in Postgres now — no
  # Redis accessory needed. See src/features/rate-limit/adapters/postgres.ts
  # for the sliding-window-with-advisory-lock pattern.

  # Asset storage lives in Cloudflare R2 (managed by infra/tofu/) served via
  # custom domain on Cloudflare's edge. No accessory needed here — the app
  # talks to R2 directly via the S3_ENDPOINT in .kamal/secrets.

  # Cloudflare Tunnel — outbound only, terminates TLS at the edge.
  # Tunnel ingress (set via tofu apply):
  #   PUBLIC_HOSTNAME  → http://kamal-proxy
  #   ASSETS_HOSTNAME  → http://meta-menu-minio:9000
  cloudflared:
    # Tag + digest pinned — see comment on the minio accessory. cloudflared
    # talks straight to your private network, so a malicious image pull
    # would be catastrophic. Roll forward by checking the latest tag at
    # https://hub.docker.com/r/cloudflare/cloudflared/tags and updating both.
    image: cloudflare/cloudflared:2026.5.0@sha256:59bab8d3aceec09bf6bdb07d6beca0225ca5cd7ab79436a87ea97978fe1dc4f9
    host: <%= ENV.fetch("ONPREM_HOST") %>
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - TUNNEL_TOKEN

  # Daily encrypted pg_dump → Cloudflare R2 (free tier ≤ 10 GB, zero egress).
  # Self-built image (infra/backup/Dockerfile) based on postgres:18-alpine
  # so pg_dump's version matches the server exactly — eeshugerman/postgres-
  # backup-s3 stops at :16 upstream, and PG rejects mismatched dumps outright.
  # Build/push via `make build-backup` (one-off; rerun when bumping Postgres).
  # Restore: `make restore` or `kamal accessory exec backups -i --reuse "sh /restore.sh"`.
  backups:
    image: ghcr.io/<%= ENV.fetch("GHCR_USER") %>/meta-menu-backup:18
    host: <%= ENV.fetch("ONPREM_HOST") %>
    env:
      clear:
        SCHEDULE: "@daily"
        BACKUP_KEEP_DAYS: "14"
        S3_REGION: auto
        S3_ENDPOINT: https://<%= ENV.fetch("CLOUDFLARE_ACCOUNT_ID") %>.r2.cloudflarestorage.com
        S3_BUCKET: <%= ENV.fetch("R2_BUCKET_NAME", "meta-menu-backups") %>
        S3_PREFIX: pg
        POSTGRES_HOST: meta-menu-postgres
        POSTGRES_DATABASE: metamenu
        POSTGRES_USER: postgres
      secret:
        - POSTGRES_PASSWORD
        - S3_ACCESS_KEY_ID
        - S3_SECRET_ACCESS_KEY
        - PASSPHRASE
