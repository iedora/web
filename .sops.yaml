# Sops recipients for the iedora app repo. One age key per MACHINE.
# Mirror of iedora-iac/.sops.yaml structure — see that file for the full
# onboarding/revoking workflow comments.
#
# Scope: human operator machines only. Bot/server keys (e.g. ops LXC) are
# intentionally NOT recipients here — ops doesn't run the app, so least
# privilege applies. If CI/CD ever needs to decrypt for deploys, add a
# dedicated `&ci_gha` key that lives only in GitHub Actions secrets.

keys:
  # ── Eduardo ─────────────────────────────────────────────────────────────
  - &eduardo_mac      age1867kx5pchlg2aty9tqhwvlyyjn6p2rmxlrn9czszusqjdu2acp9qakhet5
  # - &eduardo_windows  age1...  # uncomment when bootstrapping Windows

  # ── (template — duplicate this block per new human) ─────────────────────
  # - &joao_mac      age1...
  # - &joao_windows  age1...

creation_rules:
  - path_regex: apps/web/\.env\.prod$
    key_groups:
      - age:
          - *eduardo_mac
          # - *eduardo_windows
          # - *joao_mac
