# Iedora pipeline — local operator orchestration over the 4 stages.
# CI does NOT use this file; per-stage GitHub Actions workflows compose
# the same stages via their own scheduling.
#
# Stage model:
#
#   Stage 1: Build & Test     per-product (bun test, bun run build, docker build)
#   Stage 2: IaC              `task infra:up`    — `tofu apply` on infra/tofu/
#   Stage 3: AppState         `task app:apply`   — every configurator under app-state/
#   Stage 4: Deploy           `task deploy:menu` / `:house` / …  — per-product
#
# Convenience:
#
#   task up           full pipeline: infra:up → app:apply → deploy:all
#   task down         full teardown: products → infra:down
#   task doctor       preflight (BWS auth + bootstrap secrets present)
#
# Adding a product → one new `deploy:<name>` task + entry in
# deploy/iedora/products.go.
#
# Adding an app-state configurator → new directory under `app-state/<name>/`,
# shim at `bin/<name>`, entry in deploy/iedora/configurators.go.
#
# Why `task` over `just`: declarative `deps:` express stage dependencies
# (deploy:all blocks on deploy:menu + deploy:house running in parallel) —
# justfile would need shell `&&` chains.

version: '3'

tasks:
  default:
    desc: "List every task"
    cmds: [task --list-all]
    silent: true

  doctor:
    desc: "Preflight: PATH, BWS auth, bootstrap secrets present"
    cmds: ["bin/iedora doctor"]

  # ── Stage 2: IaC ──────────────────────────────────────────────────────
  # Owns: Hetzner VPS, Cloudflare (R2, DNS), GitHub Actions config, Docker
  # network + volumes, every shared service container (postgres, zitadel,
  # zitadel-login, caddy, openobserve, backups). Does NOT own Zitadel app
  # config or any product container.

  infra:up:
    desc: "Bring up infrastructure (Hetzner + Cloudflare + shared containers)"
    cmds:
      - "bin/with-secrets --stage iac -- bin/iedora iac apply"

  infra:down:
    desc: "Tear down the central infra (state-rm docker_*, empty R2, tofu destroy)"
    cmds:
      - "bin/with-secrets --stage iac -- bin/iedora iac destroy"

  # ── Stage 3: AppState ─────────────────────────────────────────────────
  # Reconciles the configuration of running shared services. Today: Zitadel,
  # menu DB migrations, OpenObserve dashboards. Each configurator is a
  # self-contained module under `app-state/<name>/` with a shim at
  # `bin/<name>`. Registered in deploy/iedora/configurators.go.

  app:apply:
    desc: "Run every app-state configurator (Zitadel, menu-db-migrations, oo-dashboards)"
    cmds:
      - "bin/with-secrets --stage app -- bin/iedora app apply"

  # ── Stage 4: Deploy (per product) ─────────────────────────────────────
  # Each product has its own deploy task — `task deploy:<name>`. The
  # underlying `iedora deploy <name>` dispatches to the product's
  # `productRuntime` (dockerOnHetzner for menu, cloudflareWorker for
  # house, …). Adding a new product = new struct in products.go + new
  # task here.

  deploy:menu:
    desc: "Deploy menu: pull image + (re)start container on Hetzner"
    cmds:
      - "bin/with-secrets --stage deploy --product menu -- bin/iedora deploy menu"

  deploy:house:
    desc: "Deploy house: bun run build + per-product `tofu apply` (CF Workers)"
    cmds:
      - "bin/with-secrets --stage deploy --product house -- bin/iedora deploy house"

  deploy:all:
    desc: "Deploy every product in parallel"
    deps: [deploy:menu, deploy:house]

  # ── Full-pipeline convenience ─────────────────────────────────────────

  up:
    desc: "Full apply: infra:up → app:apply → deploy:all"
    cmds:
      - task: infra:up
      - task: app:apply
      - task: deploy:all

  down:
    desc: "Full teardown: destroy every product → infra:down"
    cmds:
      - "bin/with-secrets --stage deploy -- bin/iedora destroy"
      - task: infra:down

  runbook:
    desc: "Pre-merge runbook: down → up → up → down → up → up (full state-vs-cloud + idempotency validation, ~45-60 min)"
    # docs/deploy.md § Pre-merge runbook — 6 steps that catch
    # cross-stage bugs (DNS races, state drift, one-shot reveal
    # recovery, hot-swap regressions) that unit tests can't.
    # Fails fast: any non-zero exit aborts the chain.
    cmds:
      - task: down       # 1: tear down from any state — idempotent
      - task: up         # 2: cold deploy (full bootstrap)
      - task: up         # 3: warm — every stage should be no-diff/no-op
      - task: down       # 4: destroy from a full estate
      - task: up         # 5: cold deploy AGAIN — catches drift
      - task: up         # 6: warm — final idempotency check

  # ── Local stack ───────────────────────────────────────────────────────
  # Boots the docker-compose-equivalent local stack (deploy/dev — the
  # binary keeps its dev/ path for now; namespace renamed to `local:` to
  # match Rule 1's `mode.Local`). Different target (local Docker daemon,
  # host-published ports, LocalStack for R2) but conceptually the same
  # 4 stages as live.

  local:
    desc: "Boot the local stack (Postgres, Zitadel, OpenObserve, …)"
    cmds: ["go run ./dev/orchestrator"]

  local:down:
    desc: "Tear down the local stack"
    cmds: ["go run ./dev/orchestrator --destroy"]

  local:reset-db:
    desc: "Drop + recreate one database without touching the rest (e.g. `task local:reset-db -- menu`)"
    cmds: ["go run ./dev/orchestrator --reset-db {{.CLI_ARGS}}"]

  local:runbook:
    desc: "Local-stack pre-merge runbook: down → up → up → down → up → up (~5 min, no real cloud)"
    # Mirror of `task runbook` against the local stack. Catches the same
    # cross-stage bugs (binary regressions, mode-flag drift, lint
    # warnings) without spending 45-60 min on real Hetzner/CF. Cheap
    # smoke pass before the live runbook.
    cmds:
      - task: local:down
      - task: local
      - task: local
      - task: local:down
      - task: local
      - task: local

  # ── Ad-hoc helpers ────────────────────────────────────────────────────

  bws:
    desc: "Exec a command with BWS secrets hydrated (e.g. `task bws -- tofu state list`)"
    cmds: ["bin/with-secrets {{.CLI_ARGS}}"]

  zitadel:grants:
    desc: "Re-run iedora-admin grants only (idempotent escape hatch)"
    cmds:
      - "bin/with-secrets --stage app -- bin/zitadel-apply --grants-only"
