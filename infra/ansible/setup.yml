---
# ════════════════════════════════════════════════════════════════════════
#  Base — pacotes, Docker, deploy user, regras UFW (sem activar)
#  Corre em todos os hosts (containers e metal).
# ════════════════════════════════════════════════════════════════════════
- name: Base — pacotes e Docker
  hosts: servers
  become: true
  vars_files:
    - ../shared/vars.yml

  tasks:
    - name: Actualizar cache apt
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Instalar pacotes base
      apt:
        name:
          - curl
          - git
          - ufw
          - ca-certificates
          - gnupg
          - unattended-upgrades
        state: present

    - name: Configurar timezone (sem hwclock para correr em container)
      shell: |
        ln -sf /usr/share/zoneinfo/{{ timezone }} /etc/localtime
        echo "{{ timezone }}" > /etc/timezone
      changed_when: false

    - name: Adicionar chave GPG do Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Adicionar repositório Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Instalar Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Adicionar deploy user ao grupo docker
      user:
        name: "{{ deploy_user }}"
        groups: docker
        append: true

    - name: Configurar regras UFW (allow apenas, activação por play específico)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ firewall_allowed_ports }}"

    - name: Hardening SSH — desactivar root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
        state: present
      notify: Reload SSH

    - name: Hardening SSH — desactivar password auth
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: Reload SSH

  handlers:
    # Handler único cross-environment: tenta systemd, fallback para HUP no PID.
    - name: Reload SSH
      shell: |
        systemctl restart ssh 2>/dev/null \
          || kill -HUP $(cat /var/run/sshd.pid 2>/dev/null \
                         || pgrep -f '/usr/sbin/sshd -D' | head -1)
      failed_when: false

# ════════════════════════════════════════════════════════════════════════
#  Metal — servidores reais (Hetzner, bare metal). Tem systemd, kernel
#  com netfilter, UFW que apanha tráfego.
# ════════════════════════════════════════════════════════════════════════
- name: Metal — systemd + UFW activo
  hosts: metal
  become: true

  tasks:
    - name: Iniciar e activar Docker via systemd
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Activar UFW (incoming = deny, regras da base play já carregadas)
      ufw:
        state: enabled
        policy: deny
        direction: incoming

# ════════════════════════════════════════════════════════════════════════
#  Containers — Docker container a fazer-se passar por servidor.
#  Sem systemd, sem netfilter eficaz. Storage driver vfs para evitar
#  overlay-on-overlay (Docker-in-Docker).
# ════════════════════════════════════════════════════════════════════════
- name: Containers — dockerd em foreground + vfs storage
  hosts: containers
  become: true

  tasks:
    - name: Configurar dockerd para vfs (overlay-on-overlay falha)
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "storage-driver": "vfs"
          }
        mode: "0644"

    - name: Garantir que dockerd está a correr
      shell: |
        if ! pgrep -x dockerd >/dev/null; then
          nohup dockerd > /var/log/dockerd.log 2>&1 &
          sleep 3
        fi
      args:
        executable: /bin/bash
      changed_when: false
