---
# Idempotent, FQCN-only, ansible-lint-clean.
# Targets the on-prem hosts listed in inventory.yml.
# Vars: infra/ansible/group_vars/all.yml (auto-loaded).

# ════════════════════════════════════════════════════════════════════════
#  Base — apt + Docker CE + deploy user + SSH hardening + UFW (enabled)
# ════════════════════════════════════════════════════════════════════════
- name: Base setup (Docker, UFW, SSH hardening)
  hosts: onprem
  become: true

  pre_tasks:
    - name: Wait for SSH transport (auth + python ping)
      ansible.builtin.wait_for_connection:
        delay: 2
        timeout: 120

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - gnupg
          - ufw
          - unattended-upgrades
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Add Docker apt repository (deb822)
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: https://download.docker.com/linux/ubuntu
        suites: "{{ ansible_distribution_release }}"
        components: stable
        architectures: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
        signed_by: https://download.docker.com/linux/ubuntu/gpg
        state: present
        enabled: true

    - name: Install Docker CE
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd_service:
        name: docker
        enabled: true
        state: started

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        groups: docker
        append: true

    - name: Configure UFW allow rules (TCP)
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ firewall_allowed_ports }}"

    # mDNS so the host advertises as <hostname>.local on the LAN — lets
    # Ansible/Kamal target the box by name instead of a hardcoded IP.
    - name: Enable MulticastDNS in systemd-resolved
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: "^#?MulticastDNS="
        line: "MulticastDNS=yes"
        state: present
      notify: restart systemd-resolved

    - name: Allow mDNS on UFW (5353/udp)
      community.general.ufw:
        rule: allow
        port: "5353"
        proto: udp

    - name: Activate UFW (deny incoming by default)
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Disable SSH root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
        state: present
      notify: reload ssh

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
      notify: reload ssh

  handlers:
    - name: reload ssh
      ansible.builtin.service:
        name: ssh
        state: reloaded

    - name: restart systemd-resolved
      ansible.builtin.systemd_service:
        name: systemd-resolved
        state: restarted

# ════════════════════════════════════════════════════════════════════════
#  Cloudflare Tunnel — cloudflared via apt + hardened systemd unit
#
#  No public IP / no port-forward needed: cloudflared dials OUT to
#  Cloudflare and proxies traffic to localhost:80 (kamal-proxy) and
#  localhost:9000 (MinIO accessory). Token from $CLOUDFLARED_TUNNEL_TOKEN
#  (sourced from .envrc). Empty token → play is skipped, so a host can
#  be provisioned without the tunnel and the tunnel added later.
# ════════════════════════════════════════════════════════════════════════
- name: Cloudflare Tunnel (cloudflared service)
  hosts: onprem
  become: true

  vars:
    cloudflared_token: "{{ lookup('env', 'CLOUDFLARED_TUNNEL_TOKEN') | default('', true) }}"

  tasks:
    - name: Skip cloudflared when no token is provided
      ansible.builtin.meta: end_host
      when: cloudflared_token | length == 0

    - name: Add Cloudflare apt repository (deb822)
      ansible.builtin.deb822_repository:
        name: cloudflared
        types: deb
        uris: https://pkg.cloudflare.com/cloudflared
        suites: "{{ ansible_distribution_release }}"
        components: main
        signed_by: https://pkg.cloudflare.com/cloudflare-main.gpg
        state: present
        enabled: true

    - name: Install cloudflared
      ansible.builtin.apt:
        name: cloudflared
        state: present
        update_cache: true

    - name: Ensure cloudflared service group
      ansible.builtin.group:
        name: cloudflared
        system: true
        state: present

    - name: Ensure cloudflared service user (no shell, no home login)
      ansible.builtin.user:
        name: cloudflared
        system: true
        group: cloudflared
        shell: /usr/sbin/nologin
        create_home: false
        state: present

    - name: Ensure /etc/cloudflared exists
      ansible.builtin.file:
        path: /etc/cloudflared
        state: directory
        owner: root
        group: cloudflared
        mode: "0750"

    # Token in its own file so the systemd unit's ExecStart never references
    # it. --token-file is supported by cloudflared >= 2025.4.0 and is the
    # upstream-recommended path (avoids token in `ps`).
    - name: Write tunnel token (cloudflared:cloudflared, 0400)
      ansible.builtin.copy:
        dest: /etc/cloudflared/token
        content: "{{ cloudflared_token }}"
        owner: cloudflared
        group: cloudflared
        mode: "0400"
      no_log: true
      notify: restart cloudflared

    - name: Install cloudflared systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/cloudflared.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Cloudflare Tunnel
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=notify
          User=cloudflared
          Group=cloudflared
          ExecStart=/usr/bin/cloudflared --no-autoupdate tunnel --loglevel info run --token-file /etc/cloudflared/token
          Restart=on-failure
          RestartSec=5s

          # Hardening
          NoNewPrivileges=true
          ProtectSystem=strict
          ProtectHome=true
          PrivateTmp=true
          PrivateDevices=true
          ProtectKernelTunables=true
          ProtectKernelModules=true
          ProtectControlGroups=true
          RestrictRealtime=true
          RestrictNamespaces=true
          LockPersonality=true
          MemoryDenyWriteExecute=true
          SystemCallArchitectures=native
          AmbientCapabilities=
          CapabilityBoundingSet=

          [Install]
          WantedBy=multi-user.target
      notify:
        - reload systemd
        - restart cloudflared

    - name: Enable and start cloudflared
      ansible.builtin.systemd_service:
        name: cloudflared
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: restart cloudflared
      ansible.builtin.systemd_service:
        name: cloudflared
        state: restarted
