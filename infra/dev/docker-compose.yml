name: iedora-local

networks:
  iedora:
    name: iedora
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: infra-postgres
    networks:
      iedora:
        aliases: [postgres, infra-postgres]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password1!
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      # Databases are created by the migrator (ensureDatabase), not an init script.
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: { driver: json-file, options: { max-size: 10m } }

  minio:
    image: minio/minio:latest
    container_name: infra-minio
    networks:
      iedora:
        aliases: [minio, infra-minio]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: { driver: json-file, options: { max-size: 10m } }

  minio-bootstrap:
    image: minio/mc:latest
    container_name: infra-minio-bootstrap
    networks: [iedora]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/iedora-dev-assets || true &&
        mc anonymous set download local/iedora-dev-assets || true
      "
    restart: "no"

