# Kamal config — single destination (Beelink). Deploy do Mac: `kamal deploy`.
#
# Registry: GHCR. Mac compila linux/amd64 via buildx emulation.
# Ingress público: cloudflared accessory → kamal-proxy (mesma docker network).

service: iedora-web
image: eduvhc/iedora-web

servers:
  web:
    hosts:
      - 192.168.50.53

ssh:
  user: root
  keys:
    - ~/.ssh/ci_ed25519

registry:
  server: ghcr.io
  username: eduvhc
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: .
  dockerfile: apps/web/Dockerfile

# kamal-proxy escuta 80/443 do host. Cloudflared (accessory abaixo) corre
# na mesma docker network e fala com kamal-proxy por container name —
# sem host.docker.internal hairpin, sem ports publicados na LAN.
proxy:
  app_port: 3000
  ssl: false
  hosts:
    - iedora.com
    - menu.iedora.com
    - core.iedora.com
    - imopush.iedora.com
  healthcheck:
    path: /up
    interval: 5

accessories:
  postgres:
    image: postgres:17
    roles:
      - web
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: postgres
      secret:
        - POSTGRES_PASSWORD
    files:
      - config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    directories:
      - data:/var/lib/postgresql/data

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.90.3
    roles: [web]
    env:
      clear:
        ZO_DATA_DIR: /data
        ZO_HTTP_PORT: "5080"
        ZO_GRPC_PORT: "5081"
        ZO_ROOT_USER_EMAIL: eduardoferdcarvalho@gmail.com
      secret:
        - ZO_ROOT_USER_PASSWORD
    directories:
      - data:/data
    port: "5080:5080"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    roles: [web]
    cmd: --config=/etc/otelcol-contrib/config.yaml
    env:
      secret:
        - OTEL_AUTH_HEADER
    files:
      - config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml

  cloudflared:
    image: cloudflare/cloudflared:latest
    roles: [web]
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - TUNNEL_TOKEN

env:
  clear:
    CORE_BASE_URL: https://core.iedora.com
    CORE_COOKIE_DOMAIN: .iedora.com
    CORE_TRUSTED_ORIGINS: https://iedora.com,https://menu.iedora.com,https://core.iedora.com
    NEXT_PUBLIC_CORE_URL: https://core.iedora.com
    NEXT_PUBLIC_MENU_URL: https://menu.iedora.com
    NEXT_PUBLIC_IMOPUSH_URL: https://imopush.iedora.com
    IEDORA_BOOTSTRAP_ADMIN_EMAILS: eduardoferdcarvalho@gmail.com
    LOG_LEVEL: info
    OTEL_EXPORTER_OTLP_ENDPOINT: http://iedora-web-otel-collector:4318
    OPENOBSERVE_ADMIN_EMAIL: eduardoferdcarvalho@gmail.com
    S3_ENDPOINT: https://2716bf6ee8be2880904e70f19050d2ef.r2.cloudflarestorage.com
    S3_REGION: auto
    S3_BUCKET: iedora-assets
  secret:
    - CORE_DATABASE_URL
    - MENU_DATABASE_URL
    - IMOPUSH_DATABASE_URL
    - CORE_SECRET
    - S3_ACCESS_KEY
    - S3_SECRET_KEY
    - MOONSHOT_API_KEY
