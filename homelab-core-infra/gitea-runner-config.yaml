# gitea/act_runner config. Mountado em /config/config.yaml no container
# (env CONFIG_FILE), aplica-se na primeira boot. Sobrepõe-se aos defaults.
#
# Notes:
#   - capacity > 1 paraleliza matrix jobs (CPU compartilhado com OO,
#     Gitea, iedora-web na mesma Beelink — 3 é o equilibrio para um
#     N100 8-core).
#   - cache.dir vive no volume `gitea_runner_data` (persistente).
#     actions/cache@v4 talks ao server interno via ACTIONS_CACHE_URL
#     injectado automaticamente.
#   - valid_volumes whitelist permite workflows montar /var/cache/buildx
#     no host (buildx local cache pattern para Docker builds).

log:
  level: info

runner:
  file: /data/.runner
  capacity: 3
  fetch_timeout: 5s
  fetch_interval: 2s
  timeout: 1h
  shutdown_timeout: 30s
  insecure: false

cache:
  enabled: true
  dir: /data/cache
  host: ""        # auto-detected
  port: 0         # auto-allocated

container:
  privileged: false
  # 2 cpus + 3 GB por job. Inicialmente bumpei a --cpus=4 para os jobs
  # paralelizarem mais (CI #21), mas o vitest com cgroup=4 spawnou 4
  # workers internos por workspace × 9 workspaces sequenciais →
  # competição com tudo o resto que corre na Beelink (cloudflared,
  # gitea, kamal-proxy, postgres, openobserve, otel-collector). Test
  # step regrediu 161s → 217s. Volta a 2 para o vitest ser polite, e
  # mantém o cap do scripts/run-parallel.mjs (availableParallelism()
  # = 2) — tsgo/eslint absorvem o cap quase sem perda.
  options: "--cpus=2 --memory=3g"
  valid_volumes:
    - /var/cache/buildx
    - /var/cache/bun
    - /var/cache/audit-tools
    - /data/cache

host: {}
