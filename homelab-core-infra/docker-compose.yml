# Shared homelab infra — usado por vários produtos (iedora e outros).
# Eventualmente vai mudar para o repo `homelab`. Mantém este compose
# independente: sem depends_on em containers iedora, sem volumes/network
# partilhados com `dev/docker-compose.yml`.
#
# Run:    docker compose -f homelab-core-infra/docker-compose.yml up -d
# Stop:   docker compose -f homelab-core-infra/docker-compose.yml down
#
# OpenObserve UI: http://localhost:5080  (dev@iedora.local / Password1!)
# OTLP HTTP:      http://localhost:5080/api/default
# OTLP gRPC:      http://localhost:5081

name: homelab-core-infra

networks:
  homelab-core:
    name: homelab-core
    driver: bridge

configs:
  # Nativo do Compose — materializa o file no container sem bind mount.
  # Quando o cliente fala com um daemon remoto via DOCKER_HOST=ssh://...
  # o file é enviado em-band, dispensando scp manual.
  gitea-runner-config:
    file: ./gitea-runner-config.yaml

volumes:
  openobserve_data:
  gitea_data:
  gitea_config:
  gitea_runner_data:
  # Volume efémero partilhado entre `gitea-runner-init` (escreve) e
  # `gitea-runner` (lê). Mantém o token de registo fora do BWS — é um
  # detalhe interno do compose, não atravessa boundary alguma.
  gitea_runner_token:

services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.90.3
    container_name: openobserve
    restart: unless-stopped
    networks:
      homelab-core:
        aliases: [openobserve]
    environment:
      # Local disk only — sem backend S3. Para multi-host scale-out
      # mais tarde, adicionar ZO_S3_* aqui.
      ZO_DATA_DIR: /data
      ZO_HTTP_PORT: "5080"
      ZO_GRPC_PORT: "5081"
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
    volumes:
      - openobserve_data:/data
    ports:
      - "5080:5080"
      - "5081:5081"
    logging: { driver: json-file, options: { max-size: 10m } }

  # ── Gitea: Git + OCI registry + Actions ──────────────────────────────
  # OCI registry endpoint:  http://<host>:3030/<owner>/<image>
  # Web UI / API:           http://<host>:3030
  # Git SSH:                ssh://git@<host>:3022/<owner>/<repo>.git
  # First-boot setup: aceder via web, criar admin via wizard.
  # Para INSTALL_LOCK=true depois, criar admin via CLI:
  #   docker exec gitea gitea admin user create --admin ...
  gitea:
    image: gitea/gitea:1.26.2-rootless
    container_name: gitea
    restart: unless-stopped
    # `extras` profile — não arranca por defeito. Para boot, passar
    # --profile extras (o up.sh fá-lo quando --host está presente).
    # Local dev (sem profile) só boota OpenObserve.
    profiles: [extras]
    networks:
      homelab-core:
        aliases: [gitea]
    ports:
      - "3030:3000"
      - "3022:2222"
    volumes:
      - gitea_data:/var/lib/gitea
      - gitea_config:/etc/gitea
    environment:
      # `INSTALL_LOCK=true` salta o setup-wizard (Gitea provisiona app.ini
      # a partir destes env vars na primeira boot). Admin user separado
      # via `gitea admin user create` depois de subir. ROOT_URL muda para
      # https://git.iedora.com depois do CF tunnel route ser provisionado.
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /var/lib/gitea/data/gitea.db
      GITEA__server__DOMAIN: 192.168.50.53
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__SSH_PORT: "3022"
      GITEA__server__SSH_DOMAIN: 192.168.50.53
      GITEA__server__ROOT_URL: "https://git.iedora.com/"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__service__ENABLE_BASIC_AUTHENTICATION: "true"
      GITEA__actions__ENABLED: "true"
    healthcheck:
      # `service_healthy` no init container abaixo depende disto. Endpoint
      # nativo, sem auth. Rootless image traz busybox wget.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    logging: { driver: json-file, options: { max-size: 10m } }

  # ── Gitea runner registration token bootstrap ────────────────────────
  # One-shot: corre no mesmo image do gitea, chama `gitea actions
  # generate-runner-token` e escreve para um volume partilhado. O runner
  # lê via GITEA_RUNNER_REGISTRATION_TOKEN_FILE. Em re-runs o runner
  # ignora o token novo (já tem .runner persistido em gitea_runner_data),
  # portanto é idempotente.
  #
  # Porque não BWS? Este token é puro detalhe interno entre dois
  # containers no mesmo compose — não cruza host nem ambiente. BWS é
  # para secrets que atravessam boundaries.
  gitea-runner-init:
    image: gitea/gitea:1.26.2-rootless
    container_name: gitea-runner-init
    profiles: [extras]
    depends_on:
      gitea:
        condition: service_healthy
    networks:
      homelab-core:
    entrypoint: ["sh", "-c", "gitea actions generate-runner-token > /token/runner-token"]
    volumes:
      - gitea_config:/etc/gitea:ro
      - gitea_data:/var/lib/gitea
      - gitea_runner_token:/token
    restart: "no"
    logging: { driver: json-file, options: { max-size: 10m } }

  # ── Gitea Actions runner (act_runner) ────────────────────────────────
  # Self-registers via GITEA_RUNNER_REGISTRATION_TOKEN_FILE (token escrito
  # pelo `gitea-runner-init` num volume partilhado), persiste config em
  # gitea_runner_data; restarts subsequentes reusam-na.
  # Labels mapeados a Docker images (Gitea convention): qualquer
  # `runs-on: ubuntu-latest` resolve para node:24-bookworm, `bun-debian`
  # para oven/bun:1.3-debian (mais rápido para o nosso monorepo Bun).
  # Docker socket montado → DinD para `docker build` em workflows.
  gitea-runner:
    image: gitea/act_runner:latest
    container_name: gitea-runner
    restart: unless-stopped
    profiles: [extras]
    depends_on:
      gitea-runner-init:
        condition: service_completed_successfully
    networks:
      homelab-core:
        aliases: [gitea-runner]
    environment:
      GITEA_INSTANCE_URL: "http://192.168.50.53:3030"
      GITEA_RUNNER_REGISTRATION_TOKEN_FILE: /token/runner-token
      GITEA_RUNNER_NAME: beelink-runner
      GITEA_RUNNER_LABELS: "ubuntu-latest:docker://node:24-bookworm,bun-debian:docker://oven/bun:1.3-debian"
      CONFIG_FILE: /config/config.yaml
    configs:
      - source: gitea-runner-config
        target: /config/config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitea_runner_data:/data
      - gitea_runner_token:/token:ro
      # Buildx local cache — workflows mountam aqui via `volumes:` block
      # (whitelisted em runner config valid_volumes).
      - /var/cache/buildx:/var/cache/buildx
    logging: { driver: json-file, options: { max-size: 10m } }
