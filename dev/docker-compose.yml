# Iedora-specific dev infra — Postgres + s3mock.
# Next.js corre no host (não no Docker) via `bun run dev`.
#
# OpenObserve vive em `home-infra/openobserve/docker-compose.yml`
# (shared, vai mudar para repo dedicado), não aqui.
#
# Boot:     bun run dev:up
# Logs:     bun run dev:logs
# Reset:    bun run dev:reset   (apaga volumes — perde dados locais)
# Stop:     bun run dev:down

name: iedora-local

networks:
  iedora:
    name: iedora
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: infra-postgres
    networks:
      iedora:
        aliases: [postgres, infra-postgres]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password1!
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: { driver: json-file, options: { max-size: 10m } }

  s3mock:
    image: adobe/s3mock:latest
    container_name: infra-s3mock
    networks:
      iedora:
        aliases: [s3mock, infra-s3mock]
    environment:
      COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: ${S3MOCK_INITIAL_BUCKETS}
    ports:
      - "${S3MOCK_HTTP_PORT}:${S3MOCK_HTTP_PORT}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${S3MOCK_HTTP_PORT}/favicon.ico"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: { driver: json-file, options: { max-size: 10m } }

