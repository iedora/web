# OpenSSF Scorecard — supply-chain posture grading.
#
# Runs ~20 checks (token permissions, dangerous workflows, pinned
# dependencies, signed releases, branch protection, vulnerabilities,
# webhooks, CII best practices, etc.) and uploads a SARIF report.
# Findings surface in the Security tab → Code scanning.
#
# Known intentional misses:
#   - Branch-Protection: 0/10 (deliberately off — see AGENTS.md § CI
#     "Branch protection: deliberately NOT enabled" and the memory
#     entry). Will lift when adding a collaborator.
#   - Code-Review: degraded score (solo project, no second pair on PRs).
#
# Both are accepted trade-offs for solo + AI-driven development; the
# score is otherwise a useful signal on the parts we DO control.

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly. Monday 05:00 UTC — after CodeQL (04:30) so the Security
    # tab updates land in one batch.
    - cron: '0 5 * * 1'
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      security-events: write  # upload SARIF to Security tab
      id-token: write         # publish results to OpenSSF (Sigstore-signed)
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # `publish_results: true` posts the score to OpenSSF's public
          # API. Public repo + no sensitive findings in the SARIF, so
          # this is fine and useful (enables the scorecard badge if we
          # ever want one in README).
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
