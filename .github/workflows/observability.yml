# @iedora/observability CI.
#
# OpenTelemetry wiring shared across the estate. Tests cover the no-op
# behaviour in NODE_ENV=test + the tenant-attribute contract. No DB, no
# network. Fast suite (~30s).

name: '[Build] Observability'

on:
  push:
    branches: [main]
    paths:
      - 'packages/iedora-observability/**'
      - 'packages/eslint-config/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/observability.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/iedora-observability/**'
      - 'packages/eslint-config/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/observability.yml'
      - '.github/actions/setup/**'
  # `gh workflow run observability.yml --ref <branch>` — manual re-trigger.
  workflow_dispatch:

concurrency:
  group: observability-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. CI does checkout + test only.
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/iedora-observability
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/iedora-observability
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/iedora-observability
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: bun run test
