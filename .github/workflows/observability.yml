# @iedora/observability CI.
#
# OpenTelemetry wiring shared across the estate. Tests cover the no-op
# behaviour in NODE_ENV=test + the tenant-attribute contract. No DB, no
# network. Fast suite (~30s).

name: '[package:observability] CI'

on:
  # Quality gate — PR + merge queue only. Main is PR-only protected, so
  # a push:main run would just duplicate the PR run that already passed.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'packages/iedora-observability/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/observability.yml'
      - '.github/actions/setup/**'
  merge_group:
  # `gh workflow run observability.yml --ref <branch>` — manual re-trigger.
  workflow_dispatch:

concurrency:
  group: observability-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. CI does checkout + test only.
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/iedora-observability
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/iedora-observability
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/iedora-observability
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - if: github.event_name == 'pull_request'
        run: bun run test -- --changed=origin/main
      - if: github.event_name != 'pull_request'
        run: bun run test
