# @iedora/product-menu CI.
#
# Workspace package at `products/menu/` — slices, drizzle schema +
# migrations, e2e test harness, all the menu surface code. Consumed
# by `apps/web` (the Next.js shell). Runs typecheck + lint + vitest +
# Playwright e2e (assembles a production menu build against Postgres +
# S3 mock services and drives chromium specs against it).

name: '[product:menu] CI'

on:
  push:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/product-menu.yml'
      - '.github/actions/setup/**'
      - '.github/scripts/wait-s3mock.sh'
  pull_request:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/product-menu.yml'
      - '.github/actions/setup/**'
      - '.github/scripts/wait-s3mock.sh'
  workflow_dispatch:

concurrency:
  group: product-menu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run test

  e2e:
    name: E2E (Playwright)
    needs: [typecheck, lint, unit]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Matrix parked at single shard. Bump to ['1/2', '2/2'] when the
    # suite grows past ~10 min. Per-worker DB isolation already in
    # place under products/menu/src/shared/testing/.
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/1']
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: Password1!
          POSTGRES_DB: menu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      s3mock:
        image: adobe/s3mock:latest
        env:
          initialBuckets: menu-test
        ports:
          - 9090:9090
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Wait for S3Mock + create bucket
        run: bash ${GITHUB_WORKSPACE}/.github/scripts/wait-s3mock.sh

      - name: Apply DB migrations
        run: bun run db:migrate:test

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build menu (production)
        # next build runs under Node even when invoked via bun run.
        # oven-sh/bun#23944 only affects `bun build` (the Bun bundler).
        # Build runs at the apps/web level — products/menu pages are
        # mounted there via re-exports.
        working-directory: apps/web
        run: bun --env-file=../../products/menu/.env.test next build

      - name: Run Playwright
        env:
          CI: 'true'
        run: bun run test:e2e -- --grep-invert "@flaky" --shard=${{ matrix.shard }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: products/menu/playwright-report
          retention-days: 14
