# @iedora/product-menu CI.
#
# Workspace package at `products/menu/` — slices, drizzle schema +
# migrations, all the menu surface code. Consumed by `apps/web` (the
# Next.js shell). Runs typecheck + lint + vitest.
#
# E2E lives in `.github/workflows/e2e.yml` — one unified Playwright run
# per PR, scoped to the products that actually changed. There is no
# per-product E2E job here.

name: '[product:menu] CI'

on:
  # Quality gate — PR + merge queue only. Main is PR-only protected, so
  # a push:main run would just duplicate the PR run that already passed.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/product-menu.yml'
      - '.github/actions/setup/**'
  merge_group:
  workflow_dispatch:

concurrency:
  group: product-menu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - if: github.event_name == 'pull_request'
        run: bun run test -- --changed=origin/main
      - if: github.event_name != 'pull_request'
        run: bun run test
