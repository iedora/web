# @iedora/auth CI.
#
# Shared auth surface — better-auth instance, Drizzle schema, AC
# taxonomy. Tests are pure-function checks over the role/scope
# bindings; no DB, no network.

name: '[package:auth] CI'

on:
  # Quality gate — PR + merge queue only. Main is PR-only protected, so
  # a push:main run would just duplicate the PR run that already passed.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'packages/auth/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/auth.yml'
      - '.github/actions/setup/**'
  merge_group:
  workflow_dispatch:

concurrency:
  group: auth-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/auth
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/auth
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/auth
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - if: github.event_name == 'pull_request'
        run: bun run test -- --changed=origin/main
      - if: github.event_name != 'pull_request'
        run: bun run test
