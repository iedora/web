# @iedora/auth CI.
#
# Shared auth surface — better-auth instance, Drizzle schema, AC
# taxonomy. Tests are pure-function checks over the role/scope
# bindings; no DB, no network.

name: '[package:auth] CI'

on:
  push:
    branches: [main]
    paths:
      - 'packages/auth/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/auth.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/auth/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/auth.yml'
      - '.github/actions/setup/**'
  workflow_dispatch:

concurrency:
  group: auth-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/auth
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/auth
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/auth
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run test
