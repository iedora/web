# Reusable Kamal deploy workflow — called by menu-deploy.yml + genkan-deploy.yml.
#
# Shape (2026-canonical Kamal-on-GHA):
#   1. Checkout @ the same SHA the upstream CI ran against
#   2. setup-buildx + ghaction-github-runtime → exposes the GHA cache token to
#      buildx subprocesses, so Kamal's `docker buildx build` reads/writes
#      `type=gha,mode=max` against this repo's cache (scoped per product).
#   3. docker/login → GHCR with GITHUB_TOKEN (rotates with the workflow run).
#   4. Install BWS CLI → Kamal's bitwarden-sm secrets adapter shells out to it.
#   5. SSH key → root@<onprem_host>.
#   6. Install Ruby + kamal gem.
#   7. `kamal deploy` (KAMAL_CI=true selects the GHA builder branch of deploy.yml).
#   8. Smoke-check /up against the public hostname.
#
# Why reusable, not composite: composites can't accept `secrets:`, can't
# parallelise across jobs, and appear as one opaque step in the deploy log.
# A real `workflow_call` job log shows each step's timing.

name: '_ Kamal deploy (reusable)'

on:
  workflow_call:
    inputs:
      product:
        description: 'Product name (menu or genkan). Drives image name, scope, working dir.'
        required: true
        type: string
      sha:
        description: 'Commit SHA to deploy. Used as the image tag.'
        required: true
        type: string
      onprem_host:
        description: 'Kamal target host (IP or DNS).'
        required: true
        type: string
      public_hostname:
        description: 'Public hostname for the post-deploy smoke check.'
        required: true
        type: string
      bws_project_id:
        description: 'Bitwarden Secrets Manager project UUID.'
        required: true
        type: string
      ghcr_user:
        description: 'GHCR namespace. Image is pushed to ghcr.io/<ghcr_user>/<product>.'
        required: true
        type: string
    secrets:
      BWS_ACCESS_TOKEN:
        description: 'Unlocks the BWS project — Kamal''s bitwarden-sm adapter uses it.'
        required: true
      KAMAL_SSH_PRIVATE_KEY:
        description: 'Private key for root@<onprem_host>. Add to ~/.ssh/authorized_keys via ssh-copy-id.'
        required: true

# Concurrency lives in the CALLERS (menu-deploy.yml, genkan-deploy.yml), not
# here — top-level concurrency in a reusable workflow that references
# `inputs.*` causes a startup_failure because `inputs` is evaluated at
# workflow-registration time, before the caller binds them.

jobs:
  deploy:
    name: Deploy ${{ inputs.product }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    permissions:
      contents: read
      packages: write         # `docker push ghcr.io/...`
      id-token: write         # GitHub-issued OIDC JWT for Tailscale WIF + Sigstore attestations
      security-events: write  # post-deploy Trivy image scan → SARIF → Security tab
      attestations: write     # SLSA build provenance + SBOM attestations attached to GHCR image

    env:
      # Selects the CI branch of the kamal deploy.yml ERB toggle (local build
      # with GHA cache, not the homelab remote builder).
      KAMAL_CI: 'true'
      # Kamal's deploy.yml reads these directly via ERB ENV.fetch.
      ONPREM_HOST: ${{ inputs.onprem_host }}
      PUBLIC_HOSTNAME: ${{ inputs.public_hostname }}
      GHCR_USER: ${{ inputs.ghcr_user }}
      # BWS access — Kamal's bitwarden-sm adapter reads these from env, and
      # so does its secrets file (which extracts INFRA_GHCR_TOKEN for
      # KAMAL_REGISTRY_PASSWORD). NOTE: we previously had a
      # KAMAL_REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }} override here,
      # paired with a `${VAR:-$(bws …)}` pattern in the kamal secrets file
      # — Kamal's secrets-file parser mangles `${VAR:-default}` syntax
      # (strips `${VAR`, leaves `:-default}` as the literal value). Both
      # sides reverted to a plain BWS fetch.
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ inputs.bws_project_id }}

    steps:
      - name: Checkout @ deploy SHA
        uses: actions/checkout@v6
        with:
          # workflow_run fires with head_sha = the upstream CI's commit. We
          # check out THAT SHA so the deploy matches what CI validated, even
          # if main has moved on.
          ref: ${{ inputs.sha }}

      - name: Install bws CLI
        # Pinned to bws v2.0.0 (Feb 2025, statically-linked MUSL). Installed
        # FIRST so the Tailscale-creds fetch step below can read from BWS.
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Fetch Tailscale federated identity from BWS
        # WIF (Tailscale GA 2026-02-19): GitHub's OIDC JWT is exchanged for a
        # short-lived Tailscale access token. No stored secret — the federated
        # identity ID and audience are public; trust is enforced server-side
        # by matching the issuer + sub claim against the Tofu-declared
        # tailscale_federated_identity.ci resource.
        id: ts
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          BWS_PROJECT_ID: ${{ vars.BWS_PROJECT_ID }}
        run: |
          set -euo pipefail
          SECRETS_JSON=$(bws secret list "$BWS_PROJECT_ID" -o json)
          CLIENT_ID=$(echo "$SECRETS_JSON" | jq -r '.[] | select(.key=="INFRA_CI_TAILSCALE_FEDERATED_ID") | .value')
          AUDIENCE=$(echo "$SECRETS_JSON" | jq -r '.[] | select(.key=="INFRA_CI_TAILSCALE_FEDERATED_AUDIENCE") | .value')
          if [ -z "$CLIENT_ID" ] || [ "$CLIENT_ID" = "null" ] || [ -z "$AUDIENCE" ] || [ "$AUDIENCE" = "null" ]; then
            echo "INFRA_CI_TAILSCALE_FEDERATED_{ID,AUDIENCE} missing in BWS." >&2
            echo "Run 'just infra::deploy' locally to mint + write-through the CI federated identity." >&2
            exit 1
          fi
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "audience=$AUDIENCE" >> "$GITHUB_OUTPUT"

      # Join the runner to the tailnet so it can reach the homelab via its
      # MagicDNS hostname (`iedora-homelab`) instead of a LAN IP that public
      # runners can't route to. Workload Identity Federation: GHA's OIDC JWT
      # is exchanged for a short-lived Tailscale token. No stored secret —
      # `audience` (Tailscale-issued, fetched from BWS) is the only side input
      # along with the federated identity ID.
      #
      # `version` pinned to a Linux-current build (cross-platform variance per
      # tailscale/github-action#284). `hostname` per-run keeps the admin
      # device list readable. `ping` blocks until MagicDNS resolves.
      - name: Connect to tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ steps.ts.outputs.client_id }}
          audience: ${{ steps.ts.outputs.audience }}
          tags: tag:ci
          version: 1.98.2
          hostname: gha-${{ inputs.product }}-${{ github.run_id }}
          ping: iedora-homelab

      # Exposes ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN as env vars that
      # buildx subprocesses inherit — without this, Kamal's `docker buildx
      # build --cache-to=type=gha,...` can't reach the GHA cache backend.
      - name: Expose GHA runtime to subprocesses
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure SSH for root@onprem
        # Auth boundary is already established by the tailnet (only `tag:ci`
        # ephemeral nodes can reach iedora-homelab per the ACL, and the
        # OAuth-issued ephemeral node lasts only this job). Strict host key
        # checking adds nothing over that and was flaking due to fingerprint
        # variance under MagicDNS resolution. Disabled in CI; local deploys
        # keep strict checks via the laptop's ~/.ssh/config.
        env:
          SSH_KEY: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}
          HOST: ${{ inputs.onprem_host }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host $HOST
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Set up Ruby + Kamal
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        # Pin to match the laptop-side gem. Bumps are deliberate. Older Kamal
        # (2.5.x) handled `.kamal/secrets` env-var expansion differently and
        # passed literal `$BWS_PROJECT_ID` to bws — caused a runtime failure
        # in CI even though local 2.11+ handled it correctly. Keep CI ≥ 2.11.
        run: gem install kamal -v 2.11.0 --no-document

      - name: Kamal deploy
        working-directory: products/${{ inputs.product }}/infra/kamal
        # --version=<sha> tags the image with the commit SHA. With the GHA
        # builder cache (mode=max, scope=<product>), a no-op rebuild is
        # ~10s; a full cold build ~3-5 min for these images.
        run: kamal deploy --version=${{ inputs.sha }}

      - name: Smoke check /up
        env:
          URL: https://${{ inputs.public_hostname }}/up
        run: |
          set -euo pipefail
          echo "[deploy] smoke-checking $URL"
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "[deploy] ✓ /up returned 200"
              break
            fi
            echo "[deploy] /up returned $CODE; retry $i/6 in 5s"
            sleep 5
            if [ "$i" = "6" ]; then
              echo "[deploy] ✗ /up never returned 200 after 30s" >&2
              exit 1
            fi
          done

      # Post-deploy CVE scan of the built image (OS layer + npm deps + jars).
      # Complements the CI-side `trivy fs` scan in menu.yml/genkan.yml, which
      # only sees the workspace lockfile — this one catches CVEs in the
      # `node:22-bookworm-slim` base layer (glibc, openssl, etc.) that fs
      # scanning is blind to.
      #
      # Positioned AFTER the deploy + smoke check on purpose: Kamal's build/
      # push/deploy is atomic and there's no clean way to gate it pre-deploy
      # without rebuilding. Failing here turns the workflow red and signals
      # `kamal rollback`; the SARIF upload below makes the findings visible
      # in the Security tab regardless of the gate's verdict.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ inputs.ghcr_user }}/${{ inputs.product }}:${{ inputs.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security
        # `if: always()` so findings persist even when the previous step
        # failed the workflow on HIGH/CRITICAL. Without this, a red gate
        # would also lose the diagnostic data.
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: image-${{ inputs.product }}

      # ── Supply-chain attestations (SLSA Level 3 provenance + SBOM) ─────────
      #
      # Sigstore + GitHub OIDC: every successful deploy mints a keyless
      # Cosign signature tying the image digest to this workflow run, plus
      # an SBOM attestation. Both are pushed to GHCR alongside the image
      # (push-to-registry: true), so `gh attestation verify oci://...`
      # works from any client without needing repo metadata.
      #
      # Skipped if the Trivy gate above failed — no point provenancing an
      # image we don't trust. `if: success()` is the default but stated
      # for clarity.
      - name: Resolve image digest
        id: digest
        if: success()
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ inputs.ghcr_user }}/${{ inputs.product }}:${{ inputs.sha }}"
          # `buildx imagetools inspect` queries the registry without
          # downloading the image. Our images are amd64-only so the top-
          # level manifest digest IS the image digest (no manifest list).
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "[attest] image digest: $DIGEST"

      - name: Attest SLSA build provenance
        if: success()
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ inputs.ghcr_user }}/${{ inputs.product }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Generate image SBOM
        if: success()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ inputs.ghcr_user }}/${{ inputs.product }}:${{ inputs.sha }}
          format: spdx-json
          output: image-sbom.spdx.json
          exit-code: '0'

      - name: Attest image SBOM
        if: success()
        uses: actions/attest-sbom@v4
        with:
          subject-name: ghcr.io/${{ inputs.ghcr_user }}/${{ inputs.product }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: image-sbom.spdx.json
          push-to-registry: true
