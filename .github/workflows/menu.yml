# Menu CI + image build/push.
#
# Runs the menu gates (typecheck + lint + Vitest + Trivy/SBOM) on every push +
# PR. On push to main, after the gates pass, builds the menu image for
# linux/amd64, pushes it to GHCR (`ghcr.io/eduvhc/menu:latest` + commit SHA),
# then triggers the infra deploy workflow to roll the Tofu-managed container
# on the Hetzner CAX11 box.
#
# Architecture note (2026-05-20): the menu container is now a Tofu-managed
# `docker_container` on a Hetzner CAX11 in Falkenstein. The CAX11 is ARM64
# (Ampere Altra). Tofu pulls the image lazily via
# `data.docker_registry_image.menu + docker_image.menu + pull_triggers`, so
# CI's job is reduced to: build + push + dispatch the infra deploy. No SSH
# from CI, no Tailscale.
#
# E2E (Playwright) runs against a production build of menu + a Bun-based
# Zitadel mock (`tests/e2e/_bootstrap.ts`) + a Postgres service + adobe/s3mock
# for S3 (LocalStack-latest now requires a licence — adobe/s3mock is the
# open-source replacement). Specs are organised per slice
# (`src/features/<slice>/e2e/`) plus cross-slice journeys
# (`tests/e2e/journeys/`) — see menu CLAUDE.md rule 15. Shard matrix is
# wired but set to 1 today; bump when spec volume justifies.
#
# Self-contained on purpose: one file is the entire menu CI surface.

name: Menu

on:
  push:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-identity/**'
      - 'packages/iedora-observability/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/menu.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-identity/**'
      - 'packages/iedora-observability/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/menu.yml'
      - '.github/actions/setup/**'
  # Re-trigger the real hosted runner without a new commit:
  #   gh workflow run menu.yml --ref <branch>
  # Useful for verifying a green local repro against actual CI hardware
  # without polluting git history with "fix(ci): try again" commits.
  workflow_dispatch:

concurrency:
  group: menu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. The build job below escalates
# (packages:write for GHCR push, id-token:write for Sigstore attestations,
# actions:write for the infra-deploy dispatch).
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    # ubuntu-24.04 ships Docker Engine, which testcontainers needs for the
    # real-Redis integration suite in src/features/rate-limit. No extra
    # setup step required.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Run Vitest
        # `bun run test` invokes the `vitest` binary whose Node shebang
        # takes over, so testcontainers' `@testcontainers/*` modules run
        # under Node here (they fail under Bun's runtime — oven-sh/bun#21342).
        run: bun run test

  security:
    name: Security (Trivy + SBOM)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Scans the workspace lockfile (Bun workspaces dedupe deps at the root,
    # so the relevant CVE surface is the whole repo). HIGH/CRITICAL gates
    # the run; --ignore-unfixed avoids failing on CVEs with no patch yet.
    # `.trivyignore` at repo root holds accepted exceptions.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Trivy vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy SBOM (SPDX JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: menu-sbom.spdx.json
          exit-code: '0'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: menu-sbom
          path: menu-sbom.spdx.json
          retention-days: 90

  e2e:
    name: E2E (Playwright)
    needs: [typecheck, lint, unit]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Matrix is parked at a single shard today. When the suite grows past
    # ~10 minutes locally, bump to `[1/2, 2/2]` (or 4) and Playwright will
    # split specs across runners. The infra (per-worker DB fork) is already
    # in place — see src/shared/testing/e2e-db.ts and the
    # `MENU_TEST_ISOLATE_WORKERS` env switch.
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/1']
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: Password1!
          POSTGRES_DB: menu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # adobe/s3mock — open-source S3 mock, ~50MB, auto-creates buckets via
      # `initialBuckets`. Replaces LocalStack because `localstack/localstack:
      # latest` started requiring LOCALSTACK_AUTH_TOKEN for any startup (their
      # Pro shift in 2024-2026). S3Mock covers the slice of S3 we exercise
      # (PutObject / HeadObject / DeleteObject / presigned URLs).
      s3mock:
        image: adobe/s3mock:latest
        env:
          initialBuckets: menu-test
        ports:
          - 9090:9090
    defaults:
      run:
        working-directory: products/menu
    # No job-level env block — every test fixture (DATABASE_URL, S3_*,
    # ZITADEL_*, MENU_SESSION_SECRET, …) lives in `products/menu/.env.test`.
    # The `*:test` scripts in package.json load it via `bun --env-file`,
    # so it's the single source of truth shared with local dev.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      - name: Wait for S3Mock + create bucket
        # adobe/s3mock's `initialBuckets` env didn't seed the bucket in
        # this image build (still NoSuchBucket on PUT). Belt-and-braces:
        # wait for readiness, then PUT the bucket explicitly. S3Mock
        # accepts unauthenticated PUT /<bucket> by default.
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9090/ >/dev/null 2>&1; then
              echo "S3Mock ready"; break
            fi
            sleep 1
          done
          curl -fsS -X PUT http://localhost:9090/menu-test
          echo "menu-test bucket ready"

      - name: Apply DB migrations
        run: bun run db:migrate:test

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      # `next build` runs under Node (it's a Node-shebanged binary) even
      # when invoked via `bun run`. The unstable combo flagged by
      # oven-sh/bun#23944 is `bun build` (the Bun bundler) on next,
      # not script-running through bun.
      - name: Build menu
        run: bun run build:test

      - name: Run Playwright
        env:
          CI: 'true'
        run: bun run test:e2e -- --grep-invert "@flaky" --shard=${{ matrix.shard }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: products/menu/playwright-report
          retention-days: 14

  build:
    name: Build + push image
    needs: [typecheck, lint, unit, security, e2e]
    # Only on push to main — PRs run the gates only. workflow_dispatch on main
    # still triggers a build for the "re-roll latest" flow.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write         # `docker push ghcr.io/eduvhc/menu`
      id-token: write         # Sigstore attestations (SLSA provenance + SBOM)
      attestations: write     # attach attestations to the GHCR image
      actions: write          # dispatch the infra-deploy workflow

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # The `ghcr.io/eduvhc/menu` package was originally created under
      # Eduardo's personal PAT, so GITHUB_TOKEN (scoped to the iedora repo)
      # can't push to it. IAC_BOOTSTRAP_GHCR_TOKEN is the same PAT, mirrored to
      # BWS + GHA secrets via Tofu. Fetch from BWS to keep it off the
      # repo's plaintext secrets list.
      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Log in to GHCR
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          BWS_PROJECT_ID: ${{ vars.BWS_PROJECT_ID }}
        run: |
          set -euo pipefail
          TOKEN=$(bws secret list "$BWS_PROJECT_ID" -o json \
            | jq -r '.[] | select(.key=="IAC_BOOTSTRAP_GHCR_TOKEN") | .value')
          [ -n "$TOKEN" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
          echo "$TOKEN" | docker login ghcr.io -u eduvhc --password-stdin

      # Image refs:
      #   - `:latest` is what Tofu's `data.docker_registry_image.menu` resolves
      #     against; bumping it triggers `pull_triggers` on the next apply.
      #   - `:<sha>` is the immutable handle for rollbacks + attestations.
      - name: Build and push image (linux/amd64)
        id: build
        # Build context is the REPO ROOT (Bun workspace) — Dockerfile copies
        # in `package.json`, `bun.lock`, `tsconfig.base.json`, and every
        # workspace under `packages/` + `products/`. See
        # products/menu/Dockerfile for the multi-stage layout.
        #
        # `linux/amd64`: target host is a Hetzner CX22 (Intel x86_64) in
        # Falkenstein — same arch as the GHA ubuntu-24.04 runner, so no
        # QEMU emulation, native build speed.
        #
        # GHA cache: `mode=max` caches every intermediate stage (deps +
        # builder + runner), `scope=menu` isolates from any future per-arch
        # or per-product builds in the same repo.
        uses: docker/build-push-action@1dc73863535b631f98b2378be8619f83b136f4a0 # v6
        with:
          context: .
          file: products/menu/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/eduvhc/menu:latest
            ghcr.io/eduvhc/menu:${{ github.sha }}
          cache-from: type=gha,scope=menu
          cache-to: type=gha,mode=max,scope=menu

      # ── Supply-chain attestations (SLSA build provenance + SBOM) ──────────
      # Keyless Cosign signature via Sigstore + GitHub OIDC, pushed to GHCR
      # alongside the image so `gh attestation verify oci://...` works
      # without repo metadata.
      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/eduvhc/menu
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ── Stage 4: deploy the freshly-built image ─────────────────────────────
  # Invokes the reusable deploy.yml workflow with product=menu + this
  # commit's SHA. The dockerOnHetzner runtime (products.go) reads
  # MENU_IMAGE_SHA from env to pin the image — no more TF_VAR + tofu
  # apply round-trip. Rollback path: `gh workflow run deploy.yml
  # --field product=menu --field image_sha=<older-sha>`.
  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      product: menu
      image_sha: ${{ github.sha }}
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      IAC_BOOTSTRAP_SSH_PRIVATE_KEY: ${{ secrets.IAC_BOOTSTRAP_SSH_PRIVATE_KEY }}
