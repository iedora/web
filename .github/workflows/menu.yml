# Menu CI.
#
# Runs the full menu pipeline (typecheck + lint + Vitest + Playwright e2e)
# whenever menu source or one of its dependencies changes.
#
# Self-contained on purpose: one file is the entire menu CI surface.
# Genkan's pipeline lives in genkan.yml and runs independently.

name: Menu

on:
  push:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/design-system/**'
      - 'packages/iedora-identity/**'
      - 'packages/iedora-auth-testkit/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/menu.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/design-system/**'
      - 'packages/iedora-identity/**'
      - 'packages/iedora-auth-testkit/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/menu.yml'
      - '.github/actions/setup/**'
  # Re-trigger the real hosted runner without a new commit:
  #   gh workflow run menu.yml --ref <branch>
  # Useful for verifying a green local repro against actual CI hardware
  # without polluting git history with "fix(ci): try again" commits.
  workflow_dispatch:

concurrency:
  group: menu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. CI does checkout + test only.
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    # ubuntu-24.04 ships Docker Engine, which testcontainers needs for the
    # real-Redis integration suite in src/features/rate-limit. No extra
    # setup step required.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run Vitest
        # `bun run test` invokes the `vitest` binary whose Node shebang
        # takes over, so testcontainers' `@testcontainers/*` modules run
        # under Node here (they fail under Bun's runtime — oven-sh/bun#21342).
        run: bun run test

  security:
    name: Security (Trivy + SBOM)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Scans the workspace lockfile (Bun workspaces dedupe deps at the root,
    # so the relevant CVE surface is the whole repo). HIGH/CRITICAL gates
    # the run; --ignore-unfixed avoids failing on CVEs with no patch yet.
    # `.trivyignore` at repo root holds accepted exceptions.
    steps:
      - uses: actions/checkout@v6
      - name: Trivy vulnerability gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy SBOM (SPDX JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: menu-sbom.spdx.json
          exit-code: '0'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: menu-sbom
          path: menu-sbom.spdx.json
          retention-days: 90

  e2e:
    name: E2E (Playwright)
    needs: [typecheck, lint, unit, security]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    defaults:
      run:
        working-directory: products/menu

    services:
      # Service container starts with the default `postgres` admin DB.
      # globalSetup connects there to CREATE `menu_test` before
      # migrations run.
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      # LocalStack stands in for MinIO/S3 in CI: GH Actions services don't
      # accept `command:` overrides (so `minio/minio` can't boot), and both
      # `minio/minio` and `bitnami/minio` public images were removed from
      # Docker Hub in 2025. LocalStack auto-boots S3 on :4566; the SDK
      # works because `forcePathStyle: true` is set in s3.ts.
      localstack:
        image: localstack/localstack:4
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - '4566:4566'
        options: >-
          --health-cmd "curl -fsS http://localhost:4566/_localstack/health | grep -q 's3'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    env:
      # --- Database + auth ---
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/menu_test
      # The cookie-injection fast path (tests/e2e/helpers/sign-in.ts) pre-signs
      # session cookies with this exact literal. playwright.config.ts:14 sets
      # the same string on the webServer's env. Pinning it here means the
      # `next build` step ALSO sees this value — without that, the build was
      # baking in whatever was in the `BETTER_AUTH_SECRET` GH secret, and
      # signInAs's cookie signatures didn't validate at runtime → every
      # signed-in spec bounced to genkan login. This is a fixture value, not
      # a real secret; the literal lives in source already.
      BETTER_AUTH_SECRET: test-secret-do-not-use-in-prod-test-secret-do-not-use-in-prod
      BETTER_AUTH_URL: http://localhost:3000
      DISABLE_AUTH_RATE_LIMIT: 'true'
      DISABLE_RATE_LIMIT: 'true'

      # --- S3 (LocalStack) ---
      S3_ENDPOINT: http://localhost:4566
      S3_REGION: us-east-1
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      S3_BUCKET: menu-test

      # --- Genkan (the auth-testkit shim) ---
      # Next 16's "collect page data" build pass executes module-level env
      # validation (src/shared/env.ts), so GENKAN_* must be present at
      # BUILD time. NEXT_PUBLIC_GENKAN_URL is also inlined into the client
      # bundle at build time via src/shared/brand.ts::GENKAN_URL, so it
      # MUST be the final testkit URL the browser hits. SHIM_PORT in
      # playwright.config.ts must match the port suffix here.
      GENKAN_OAUTH_CLIENT_ID: menu
      GENKAN_OAUTH_CLIENT_SECRET: menu-secret
      GENKAN_ISSUER_URL: http://127.0.0.1:4444
      NEXT_PUBLIC_GENKAN_URL: http://127.0.0.1:4444

      # --- Misc ---
      NEXT_TELEMETRY_DISABLED: '1'
      CI: 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: ./.github/actions/setup

      - name: Resolve installed Playwright version
        # Source of truth = the version Bun actually resolved into node_modules,
        # not a hard-coded literal. A stale literal here is precisely what
        # broke the previous CI run: the cache key matched an older Playwright
        # whose chromium-headless-shell version didn't match the binary the
        # newer @playwright/test was looking for at launch time.
        # See: https://playwright.dev/docs/ci#caching-browsers
        id: pw-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Next.js build output
        uses: actions/cache@v5
        with:
          # Turbopack's persistent cache. Key hashes ONLY deps + config —
          # Turbopack does per-module invalidation internally, so hashing
          # source files defeats incremental builds (every commit = cold
          # cache). Vercel's stale 2023 doc still says to hash sources;
          # that guidance pre-dates Turbopack's persistent cache.
          path: products/menu/.next/cache
          key: next-menu-${{ runner.os }}-${{ hashFiles('products/menu/bun.lock', 'products/menu/next.config.ts') }}
          restore-keys: |
            next-menu-${{ runner.os }}-

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers (cold cache)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (warm cache)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "CREATE DATABASE menu_test;"

      - name: Bootstrap S3 bucket
        # LocalStack starts with zero buckets. `aws` CLI v2 is preinstalled
        # on ubuntu-24.04 runners; no install step needed.
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws --endpoint-url=http://localhost:4566 s3 mb s3://menu-test
          aws --endpoint-url=http://localhost:4566 s3api put-bucket-acl \
            --bucket menu-test --acl public-read

      - name: Build Next.js
        # Node, not Bun — production runtime parity + AGENTS.md guidance.
        # `node --run` is the Node 22+ way to invoke a package.json script.
        run: node --run build

      - name: Run Playwright
        # playwright.config.ts skips its own `build` step when CI=true,
        # so this only launches `next start` + runs the suite.
        run: bunx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: products/menu/playwright-report/
          retention-days: 7

      - name: Upload traces, screenshots, and videos on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: products/menu/test-results/
          retention-days: 14
