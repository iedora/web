# Menu CI + image build/push.
#
# Runs the menu gates (typecheck + lint + Vitest + Trivy/SBOM) on every push +
# PR. On push to main, after the gates pass, builds the menu image for
# linux/amd64 + linux/arm64, pushes it to GHCR (`ghcr.io/eduvhc/menu:latest`
# + commit SHA), then dispatches the Stage-4 deploy workflow with the
# image SHA pinned.
#
# Architecture note: the menu container is owned by Stage 4
# (`infra/deploy/cmd/iedora/runtime_docker.go`, dockerOnHetzner runtime), NOT by
# Tofu. The SHARED services (postgres, zitadel, caddy, openobserve,
# backups) live in the rendered compose stack — see
# `infra/iac/tofu/compose.tf`. CI's job is build + push;
# the deploy job SSHes to the box, pulls the pinned image, runs
# migrations, and replaces the container.
#
# E2E (Playwright) runs against a production build of menu + a Bun-based
# Zitadel mock (`tests/e2e/_bootstrap.ts`) + a Postgres service + adobe/s3mock
# for S3 (LocalStack-latest now requires a licence — adobe/s3mock is the
# open-source replacement). Specs are organised per slice
# (`src/features/<slice>/e2e/`) plus cross-slice journeys
# (`tests/e2e/journeys/`) — see menu CLAUDE.md rule 15. Shard matrix is
# wired but set to 1 today; bump when spec volume justifies.
#
# Self-contained on purpose: one file is the entire menu CI surface.

name: Menu

on:
  push:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-observability/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/menu.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-observability/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/menu.yml'
      - '.github/actions/setup/**'
  # Re-trigger the real hosted runner without a new commit:
  #   gh workflow run menu.yml --ref <branch>
  # Useful for verifying a green local repro against actual CI hardware
  # without polluting git history with "fix(ci): try again" commits.
  workflow_dispatch:

concurrency:
  group: menu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. The build job below escalates
# (packages:write for GHCR push, id-token:write for Sigstore attestations,
# actions:write for the infra-deploy dispatch).
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    # ubuntu-24.04 ships Docker Engine. Most slices run against PGLite
    # in-process; any future testcontainers-based suite picks the daemon
    # up without extra setup.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
      - name: Run Vitest
        # `bun run test` invokes the `vitest` binary whose Node shebang
        # takes over, so testcontainers' `@testcontainers/*` modules run
        # under Node here (they fail under Bun's runtime — oven-sh/bun#21342).
        run: bun run test

  security:
    name: Security (Trivy + SBOM)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Scans the workspace lockfile (Bun workspaces dedupe deps at the root,
    # so the relevant CVE surface is the whole repo). HIGH/CRITICAL gates
    # the run; --ignore-unfixed avoids failing on CVEs with no patch yet.
    # `.trivyignore` at repo root holds accepted exceptions.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Trivy vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy SBOM (SPDX JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: menu-sbom.spdx.json
          exit-code: '0'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: menu-sbom
          path: menu-sbom.spdx.json
          retention-days: 90

  e2e:
    name: E2E (Playwright)
    needs: [typecheck, lint, unit]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Matrix is parked at a single shard today. When the suite grows past
    # ~10 minutes locally, bump to `[1/2, 2/2]` (or 4) and Playwright will
    # split specs across runners. The infra (per-worker DB fork) is already
    # in place — see src/shared/testing/e2e-db.ts and the
    # `MENU_TEST_ISOLATE_WORKERS` env switch.
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/1']
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: Password1!
          POSTGRES_DB: menu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # adobe/s3mock — open-source S3 mock, ~50MB, auto-creates buckets via
      # `initialBuckets`. Replaces LocalStack because `localstack/localstack:
      # latest` started requiring LOCALSTACK_AUTH_TOKEN for any startup (their
      # Pro shift in 2024-2026). S3Mock covers the slice of S3 we exercise
      # (PutObject / HeadObject / DeleteObject / presigned URLs).
      s3mock:
        image: adobe/s3mock:latest
        env:
          initialBuckets: menu-test
        ports:
          - 9090:9090
    defaults:
      run:
        working-directory: products/menu
    # No job-level env block — every test fixture (DATABASE_URL, S3_*,
    # ZITADEL_*, MENU_SESSION_SECRET, …) lives in `products/menu/.env.test`.
    # The `*:test` scripts in package.json load it via `bun --env-file`,
    # so it's the single source of truth shared with local dev.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Wait for S3Mock + create bucket
        # adobe/s3mock's `initialBuckets` env didn't seed the bucket in
        # this image build (still NoSuchBucket on PUT). Belt-and-braces:
        # wait for readiness, then PUT the bucket explicitly. S3Mock
        # accepts unauthenticated PUT /<bucket> by default.
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9090/ >/dev/null 2>&1; then
              echo "S3Mock ready"; break
            fi
            sleep 1
          done
          curl -fsS -X PUT http://localhost:9090/menu-test
          echo "menu-test bucket ready"

      - name: Apply DB migrations
        run: bun run db:migrate:test

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      # `next build` runs under Node (it's a Node-shebanged binary) even
      # when invoked via `bun run`. The unstable combo flagged by
      # oven-sh/bun#23944 is `bun build` (the Bun bundler) on next,
      # not script-running through bun.
      - name: Build menu
        run: bun run build:test

      - name: Run Playwright
        env:
          CI: 'true'
        run: bun run test:e2e -- --grep-invert "@flaky" --shard=${{ matrix.shard }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: products/menu/playwright-report
          retention-days: 14

  # ── Stage 1: per-arch native build ──────────────────────────────────────
  # Matrix splits the build across two NATIVE runners — `ubuntu-24.04`
  # (amd64) + `ubuntu-24.04-arm` (Ampere Altra, free for public repos
  # since 2025). No QEMU, no emulation tax. Each arch builds + pushes a
  # tagless blob via `push-by-digest=true`; the digest is uploaded as an
  # artifact so the merge job can stitch the manifest list. Pattern from
  # docs.docker.com/build/ci/github-actions/multi-platform.
  build:
    name: Build + push (${{ matrix.platform }})
    needs: [typecheck, lint, unit, security, e2e]
    # Only on push to main — PRs run the gates only. workflow_dispatch on main
    # still triggers a build for the "re-roll latest" flow.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            bws_arch: x86_64-unknown-linux-gnu
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            bws_arch: aarch64-unknown-linux-gnu

    permissions:
      contents: read
      packages: write         # `docker push ghcr.io/eduvhc/menu`
      id-token: write         # Sigstore attestations (SLSA provenance + SBOM)
      attestations: write     # attach attestations to the GHCR image

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # `/` is illegal in artifact names. `linux/amd64` → `linux-amd64`.
      - name: Derive platform slug
        id: slug
        run: echo "value=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # The `ghcr.io/eduvhc/menu` package was originally created under
      # Eduardo's personal PAT, so GITHUB_TOKEN (scoped to the iedora repo)
      # can't push to it. IAC_BOOTSTRAP_GHCR_TOKEN is the same PAT, mirrored to
      # BWS + GHA secrets via Tofu. Fetch from BWS to keep it off the
      # repo's plaintext secrets list.
      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
          BWS_ARCH: ${{ matrix.bws_arch }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-${BWS_ARCH}-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Log in to GHCR
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          BWS_PROJECT_ID: ${{ vars.BWS_PROJECT_ID }}
        run: |
          set -euo pipefail
          TOKEN=$(bws secret list "$BWS_PROJECT_ID" -o json \
            | jq -r '.[] | select(.key=="IAC_BOOTSTRAP_GHCR_TOKEN") | .value')
          [ -n "$TOKEN" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
          echo "$TOKEN" | docker login ghcr.io -u eduvhc --password-stdin

      # Build context: REPO ROOT (Bun workspace) — Dockerfile copies in
      # `package.json`, `bun.lock`, `tsconfig.base.json`, and every
      # workspace under `packages/` + `products/`. See
      # products/menu/Dockerfile for the multi-stage layout.
      #
      # `push-by-digest=true` + `name-canonical=true` → the registry
      # gets a tagless blob keyed by sha256. The merge job then runs
      # `docker buildx imagetools create` to publish `:latest` /
      # `:<sha>` as a manifest list fanning over both digests.
      #
      # GHA cache scope is per-arch so the two matrix legs don't stomp
      # on each other's intermediate stages.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f6010ea70151369b06f0194be1051fbbdff851b2 # v6.0.2
        with:
          context: .
          file: products/menu/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/eduvhc/menu,push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=menu-${{ steps.slug.outputs.value }}
          cache-to: type=gha,mode=max,scope=menu-${{ steps.slug.outputs.value }}

      # Stash the digest as a 0-byte file named for the sha256. The
      # merge job globs `*` over the unpacked artifacts and turns them
      # back into `ghcr.io/eduvhc/menu@sha256:<digest>` refs.
      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-menu-${{ steps.slug.outputs.value }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Stage 1b: stitch digests into a manifest list ───────────────────────
  # Combines the amd64 + arm64 digests pushed above into a single
  # multi-arch manifest list under `:latest` + `:<sha>`. Runs once on
  # x86_64 — the merge is just registry plumbing, no image content
  # crosses the runner.
  merge:
    name: Merge multi-arch manifest
    needs: [build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.inspect.outputs.digest }}

    permissions:
      contents: read
      packages: write
      id-token: write         # Sigstore attestation on the merged manifest
      attestations: write
      actions: write          # dispatch the deploy workflow

    steps:
      - name: Download digests
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: /tmp/digests
          pattern: digests-menu-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Log in to GHCR
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          BWS_PROJECT_ID: ${{ vars.BWS_PROJECT_ID }}
        run: |
          set -euo pipefail
          TOKEN=$(bws secret list "$BWS_PROJECT_ID" -o json \
            | jq -r '.[] | select(.key=="IAC_BOOTSTRAP_GHCR_TOKEN") | .value')
          [ -n "$TOKEN" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
          echo "$TOKEN" | docker login ghcr.io -u eduvhc --password-stdin

      # `imagetools create` treats each `name@sha256:<digest>` source as
      # one platform descriptor and rewrites the destination manifest
      # list to fan over all of them.
      #
      # Image refs:
      #   - `:latest` is the floating tag, useful for ad-hoc inspection.
      #   - `:<sha>` is what Stage 4 (dockerOnHetzner) actually pulls —
      #     immutable handle, also the subject of attestations + the
      #     rollback knob via `gh workflow run deploy.yml --field image_sha=…`.
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t ghcr.io/eduvhc/menu:latest \
            -t ghcr.io/eduvhc/menu:${{ github.sha }} \
            $(printf 'ghcr.io/eduvhc/menu@sha256:%s ' *)

      # Pull the manifest list digest back so the attestation has a
      # stable subject. `imagetools inspect --format` is the canonical
      # way; `docker manifest inspect` returns parsed JSON, not the
      # canonical byte stream.
      - name: Inspect merged manifest digest
        id: inspect
        run: |
          set -euo pipefail
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/eduvhc/menu:${{ github.sha }}" --format '{{json .Manifest}}' \
            | jq -r '.digest')
          [ -n "$DIGEST" ] && [ "$DIGEST" != "null" ] || { echo "failed to resolve manifest digest" >&2; exit 1; }
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      # ── Supply-chain attestations (SLSA build provenance) ──────────
      # Keyless Cosign signature via Sigstore + GitHub OIDC, attached
      # to the manifest list digest so `gh attestation verify oci://...`
      # resolves against the multi-arch image as a unit.
      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/eduvhc/menu
          subject-digest: ${{ steps.inspect.outputs.digest }}
          push-to-registry: true

  # ── Stage 4: deploy the freshly-built image ─────────────────────────────
  # Invokes the reusable deploy.yml workflow with product=menu + this
  # commit's SHA. The dockerOnHetzner runtime (products.go) reads
  # MENU_IMAGE_SHA from env to pin the image — no more TF_VAR + tofu
  # apply round-trip. Rollback path: `gh workflow run deploy.yml
  # --field product=menu --field image_sha=<older-sha>`.
  deploy:
    needs: merge
    uses: ./.github/workflows/deploy.yml
    with:
      product: menu
      image_sha: ${{ github.sha }}
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      IAC_BOOTSTRAP_SSH_PRIVATE_KEY: ${{ secrets.IAC_BOOTSTRAP_SSH_PRIVATE_KEY }}
