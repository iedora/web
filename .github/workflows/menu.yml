# Menu CI + image build/push.
#
# Runs the menu gates (typecheck + lint + Vitest + Trivy/SBOM) on every push +
# PR. On push to main, after the gates pass, builds the menu image for
# linux/amd64, pushes it to GHCR (`ghcr.io/eduvhc/menu:latest` + commit SHA),
# then triggers the infra deploy workflow to roll the Tofu-managed container
# on the Hetzner CAX11 box.
#
# Architecture note (2026-05-20): the menu container is now a Tofu-managed
# `docker_container` on a Hetzner CAX11 in Falkenstein. The CAX11 is ARM64
# (Ampere Altra). Tofu pulls the image lazily via
# `data.docker_registry_image.menu + docker_image.menu + pull_triggers`, so
# CI's job is reduced to: build + push + dispatch the infra deploy. No SSH
# from CI, no Tailscale.
#
# E2E (Playwright) is intentionally omitted: the auth-coupled specs were
# never rewritten after the Zitadel cutover (issue #20) and now need a
# Zitadel stub at test boot. Will be rebuilt once the testkit shim lands.
#
# Self-contained on purpose: one file is the entire menu CI surface.

name: Menu

on:
  push:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-identity/**'
      - 'packages/iedora-observability/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/menu.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'products/menu/**'
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - 'packages/iedora-identity/**'
      - 'packages/iedora-observability/**'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/menu.yml'
      - '.github/actions/setup/**'
  # Re-trigger the real hosted runner without a new commit:
  #   gh workflow run menu.yml --ref <branch>
  # Useful for verifying a green local repro against actual CI hardware
  # without polluting git history with "fix(ci): try again" commits.
  workflow_dispatch:

concurrency:
  group: menu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. The build job below escalates
# (packages:write for GHCR push, id-token:write for Sigstore attestations,
# actions:write for the infra-deploy dispatch).
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    # ubuntu-24.04 ships Docker Engine, which testcontainers needs for the
    # real-Redis integration suite in src/features/rate-limit. No extra
    # setup step required.
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Run Vitest
        # `bun run test` invokes the `vitest` binary whose Node shebang
        # takes over, so testcontainers' `@testcontainers/*` modules run
        # under Node here (they fail under Bun's runtime — oven-sh/bun#21342).
        run: bun run test

  security:
    name: Security (Trivy + SBOM)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Scans the workspace lockfile (Bun workspaces dedupe deps at the root,
    # so the relevant CVE surface is the whole repo). HIGH/CRITICAL gates
    # the run; --ignore-unfixed avoids failing on CVEs with no patch yet.
    # `.trivyignore` at repo root holds accepted exceptions.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Trivy vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy SBOM (SPDX JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: menu-sbom.spdx.json
          exit-code: '0'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: menu-sbom
          path: menu-sbom.spdx.json
          retention-days: 90

  build:
    name: Build + push image
    needs: [typecheck, lint, unit, security]
    # Only on push to main — PRs run the gates only. workflow_dispatch on main
    # still triggers a build for the "re-roll latest" flow.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write         # `docker push ghcr.io/eduvhc/menu`
      id-token: write         # Sigstore attestations (SLSA provenance + SBOM)
      attestations: write     # attach attestations to the GHCR image
      actions: write          # dispatch the infra-deploy workflow

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # The `ghcr.io/eduvhc/menu` package was originally created under
      # Eduardo's personal PAT, so GITHUB_TOKEN (scoped to the iedora repo)
      # can't push to it. INFRA_GHCR_TOKEN is the same PAT, mirrored to
      # BWS + GHA secrets via Tofu. Fetch from BWS to keep it off the
      # repo's plaintext secrets list.
      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Log in to GHCR
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          BWS_PROJECT_ID: ${{ vars.BWS_PROJECT_ID }}
        run: |
          set -euo pipefail
          TOKEN=$(bws secret list "$BWS_PROJECT_ID" -o json \
            | jq -r '.[] | select(.key=="INFRA_GHCR_TOKEN") | .value')
          [ -n "$TOKEN" ] || { echo "INFRA_GHCR_TOKEN missing in BWS" >&2; exit 1; }
          echo "$TOKEN" | docker login ghcr.io -u eduvhc --password-stdin

      # Image refs:
      #   - `:latest` is what Tofu's `data.docker_registry_image.menu` resolves
      #     against; bumping it triggers `pull_triggers` on the next apply.
      #   - `:<sha>` is the immutable handle for rollbacks + attestations.
      - name: Build and push image (linux/amd64)
        id: build
        # Build context is the REPO ROOT (Bun workspace) — Dockerfile copies
        # in `package.json`, `bun.lock`, `tsconfig.base.json`, and every
        # workspace under `packages/` + `products/`. See
        # products/menu/Dockerfile for the multi-stage layout.
        #
        # `linux/amd64`: target host is a Hetzner CX22 (Intel x86_64) in
        # Falkenstein — same arch as the GHA ubuntu-24.04 runner, so no
        # QEMU emulation, native build speed.
        #
        # GHA cache: `mode=max` caches every intermediate stage (deps +
        # builder + runner), `scope=menu` isolates from any future per-arch
        # or per-product builds in the same repo.
        uses: docker/build-push-action@1dc73863535b631f98b2378be8619f83b136f4a0 # v6
        with:
          context: .
          file: products/menu/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/eduvhc/menu:latest
            ghcr.io/eduvhc/menu:${{ github.sha }}
          cache-from: type=gha,scope=menu
          cache-to: type=gha,mode=max,scope=menu

      # ── Supply-chain attestations (SLSA build provenance + SBOM) ──────────
      # Keyless Cosign signature via Sigstore + GitHub OIDC, pushed to GHCR
      # alongside the image so `gh attestation verify oci://...` works
      # without repo metadata.
      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/eduvhc/menu
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── Trigger infra deploy ──────────────────────────────────────────────
      # Fires `infra-deploy.yml` (workflow_dispatch) passing this commit's
      # SHA as `image_sha`. The infra workflow sets
      # `TF_VAR_menu_image_sha=<sha>` in its job env, so the next `tofu apply`
      # pins `docker_image.menu` at THIS exact tag — fully deterministic.
      #
      # Rollback path (no BWS round-trip):
      #   gh workflow run infra-deploy.yml --field image_sha=<older-sha>
      - name: Trigger infra deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run infra-deploy.yml \
            --ref main \
            --field image_sha=${{ github.sha }}
