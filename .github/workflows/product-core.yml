# @iedora/product-core CI.
#
# Workspace package at `products/core/` — pure-TS modules (slices,
# components, server functions) consumed by `apps/web` (the Next.js
# shell). No Next.js boot here; runs lint + typecheck + vitest.
#
# Phase 1 of #42: scaffolding only — the slice tree still lives in
# apps/web/src/features/ and migrates in here incrementally.

name: '[product:core] CI'

on:
  # Quality gate — PR + merge queue only. Main is PR-only protected, so
  # a push:main run would just duplicate the PR run that already passed.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'products/core/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/product-core.yml'
      - '.github/actions/setup/**'
  merge_group:
  workflow_dispatch:

concurrency:
  group: product-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/core
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/core
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/core
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - if: github.event_name == 'pull_request'
        run: bun run test -- --changed=origin/main
      - if: github.event_name != 'pull_request'
        run: bun run test
