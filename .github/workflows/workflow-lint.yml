# Workflow-level policy scan — catches drift into anti-patterns:
# missing permissions:, untrusted pull_request_target inputs, deprecated
# runners, unpinned actions, etc. Runs only when workflow/action files
# change. ~30s per invocation.
#
# actionlint runs locally too (dev loop), but CI is the enforcement gate.

name: '[security] Workflow policy'

on:
  # push:main kept as a safety net — admin overrides could land workflow
  # changes without a PR. Cheap (~30s) so the duplicate cost is fine.
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/scripts/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/scripts/**'
  merge_group:

permissions:
  contents: read

jobs:
  lint:
    name: Lint workflows
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color .github/workflows/*.yml
          sudo apt-get update -qq && sudo apt-get install -yqq shellcheck
          shellcheck --shell=bash .github/scripts/*.sh
        shell: bash
