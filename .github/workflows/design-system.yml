# @iedora/design-system CI.
#
# Editorial CSS + React primitives consumed by every product. jsdom-backed
# Vitest suite — no DB, no services.

name: '[package:design-system] CI'

on:
  push:
    branches: [main]
    paths:
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/design-system.yml'
      - '.github/actions/setup/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/design-system/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/design-system.yml'
      - '.github/actions/setup/**'
  # `gh workflow run design-system.yml --ref <branch>` — manual re-trigger.
  workflow_dispatch:

concurrency:
  group: design-system-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — least privilege. CI does checkout + test only.
permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/design-system
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/design-system
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/design-system
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run test
