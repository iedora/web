# Dependency Review — blocks PRs that introduce HIGH/CRITICAL CVEs.
#
# Complements the post-merge Trivy fs scan in menu.yml/genkan.yml by
# catching vulnerable deps at PR time, before they land on main. The
# diff is `bun.lock` base-vs-head: if the PR adds a vulnerable package
# version, the run fails and a comment is posted.
#
# Why a separate workflow (not folded into menu.yml/genkan.yml): the
# check is repo-global — `bun.lock` is shared across every workspace.
# Per-product gating would double the run for no extra signal. One
# workflow at the root covers every PR uniformly.
#
# pull_request only — no point checking on push to main (already
# merged) or on schedule (no diff to compare).

name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # post the summary comment on the PR

jobs:
  review:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          # Match Trivy's gate level. Patches with no upstream fix yet
          # still need a manual decision (matching Trivy's
          # --ignore-unfixed semantics — but dependency-review can't
          # replicate that flag, so accept the occasional false fail).
          fail-on-severity: high
          comment-summary-in-pr: always
          # License gate is out of scope today — we accept anything OSI-
          # approved without enforcing a whitelist. Flip to a `allow-
          # licenses:` list if/when a customer contract demands SPDX
          # provenance.
          license-check: false
