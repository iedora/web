# Stage 3 (AppState) — runs every Stage-3 configurator against the live
# infra. Registry at `infra/deploy/cmd/iedora/configurators.go`.
#
# Triggers:
#
#   workflow_dispatch                manual button (also called by infra-deploy
#                                    on its successful run)
#   push (paths-filtered)            push to main touching the reconciler code
#                                    OR a configurator's source tree
#   workflow_run                     re-reconcile after every successful infra
#                                    apply

name: '[Deploy] App state'

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'infra/app-state/**'
      - 'infra/deploy/cmd/iedora/configurators.go'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/app-state.yml'
  workflow_run:
    workflows: ['[Deploy] Infra']
    types: [completed]
    branches: [main]

concurrency:
  group: app-state
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    name: '[Deploy] App state apply'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # When fired by workflow_run, only proceed if the upstream Infra deploy
    # succeeded. Skips the cascade when an infra failure left state
    # half-applied — operator fixes infra first.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Wait for ghcr.io/eduvhc/menu:latest
        # Both Stage-3 configurators (`core-db-migrations`,
        # `menu-db-migrations`) `docker run --rm <menu-image>` on the
        # box. On a fresh Day 1, the menu image is being built in
        # parallel by `menu.yml`; if `Infra deploy` finishes first this
        # workflow would crash on `docker pull`. Block here until GHCR
        # exposes a `latest` tag (the manifest list `imagetools create`
        # pushes alongside `:<sha>`).
        #
        # Day-2 paths (push to infra/app-state/** or manual dispatch on
        # a warm cluster) skip the wait immediately — `:latest` already
        # exists from a prior CI run.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 1800 ))   # 30 min budget
          while true; do
            if gh api -H "Accept: application/vnd.github+json" \
                 /users/eduvhc/packages/container/menu/versions \
                 --jq '.[].metadata.container.tags[]' 2>/dev/null \
                 | grep -qx 'latest'; then
              echo "✓ ghcr.io/eduvhc/menu:latest is available"
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "✗ menu:latest still missing after 30 min — abort"
              exit 1
            fi
            echo "menu:latest not yet pushed — waiting 30s"
            sleep 30
          done

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Install Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install OpenTofu
        # Stage 3 reads `hetzner_ipv4` via `tofu output -raw` so it can
        # SSH to the box (menu-db-migrations + openobserve-dashboards).
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      - name: Configure SSH (Stage 3 configurators SSH to the box)
        # SSH key comes from BWS (IAC_BOOTSTRAP_SSH_PRIVATE_KEY), hydrated
        # via bin/iedora-env. Single source of truth — not a separate GH
        # Actions secret.
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          bin/iedora-env bash -c 'printf "%s\n" "$IAC_BOOTSTRAP_SSH_PRIVATE_KEY"' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'StrictHostKeyChecking accept-new\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: bin/iedora app apply
        run: bin/iedora-env bin/iedora app apply
