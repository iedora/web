# Stage 3 (AppState) — runs every Stage-3 configurator against the live
# infra. Registry at `infra/deploy/cmd/iedora/configurators.go`.
#
# Triggers:
#
#   workflow_dispatch                manual button (also called by infra-deploy
#                                    on its successful run)
#   push (paths-filtered)            push to main touching the reconciler code
#                                    OR a configurator's source tree
#   workflow_run                     re-reconcile after every successful infra
#                                    apply

name: App state (Stage 3)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'infra/app-state/**'
      - 'infra/deploy/cmd/iedora/configurators.go'
      - 'bin/zitadel-apply'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/app-state.yml'
  workflow_run:
    workflows: ['Infra deploy']
    types: [completed]
    branches: [main]

concurrency:
  group: app-state
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    name: bin/iedora app apply
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # When fired by workflow_run, only proceed if the upstream Infra deploy
    # succeeded. Skips the cascade when an infra failure left state
    # half-applied — operator fixes infra first.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ vars.BWS_PROJECT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Install Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install OpenTofu
        # Stage 3 reads `hetzner_ipv4` via `tofu output -raw` (zitadel-apply
        # and menu-db-migrations both SSH to the box).
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      - name: Configure SSH (Stage 3 configurators SSH to the box)
        env:
          SSH_KEY: ${{ secrets.IAC_BOOTSTRAP_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'StrictHostKeyChecking accept-new\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: bin/iedora app apply
        run: bws run -- bin/iedora app apply
