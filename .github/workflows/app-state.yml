# Stage 3 (AppState) — runs every Stage-3 configurator against the live
# infra. Registry at `infra/deploy/cmd/iedora/configurators.go`.
#
# Sole trigger: `workflow_dispatch`. Dispatched by:
#
#   - web.yml's `run_app_state` job (the primary path: a successful
#     apps:web build pushes the image, then dispatches this workflow
#     against the just-built SHA to apply migrations before deploy).
#   - operators reconciling app state out-of-band.
#
# The previous push + workflow_run triggers were both removed:
#
#   workflow_run on [infra] Deploy — fired ~half the time in practice
#                                    (GHA quirk; tracked as CI-4
#                                    historical note in tech-debt).
#
#   push on infra/app-state/**     — racy: configurator-only commits
#                                    auto-triggered app-state BEFORE
#                                    the matching web image was built,
#                                    leaving Stage 3 to pull the
#                                    previous :latest image and fail
#                                    on missing files. The dispatch-
#                                    from-web pattern guarantees image
#                                    ordering. Configurator-only
#                                    changes are validated either via
#                                    operator dispatch or on the next
#                                    web-touching commit.

name: '[infra] App state'

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Image SHA tag to pull (default :latest). web.yml passes github.sha here.'
        type: string
        required: false
        default: latest

concurrency:
  group: app-state
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/infra/install-bws

      - name: Wait for ghcr.io/eduvhc/migrate:latest
        # Stage-3 configurators `docker run --rm` the migrate image to
        # apply DB migrations. The migrate image is independent of
        # the web image — built by `.github/workflows/migrate.yml`
        # whenever migration SQL or migrate scripts change. It may
        # NOT be at the same SHA as the web image (most pushes don't
        # touch migrations).
        #
        # We poll for `:latest` — the most recently pushed migrator.
        # If migrate.yml was triggered by this same push, by the
        # time we get here it has finished. If migrations didn't
        # change in this push, `:latest` is the previous good
        # migrate image (correct — no new migrations to apply, run
        # is a no-op).
        #
        # GHCR `migrate` package is PRIVATE (same as web); use
        # IAC_BOOTSTRAP_GHCR_TOKEN (PAT) instead of GITHUB_TOKEN
        # which can't see user-owned private packages.
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # The inner bash via bin/iedora-env expands these, not the outer shell.
          # shellcheck disable=SC2016
          bin/iedora-env bash -c '
            set -euo pipefail
            [ -n "${IAC_BOOTSTRAP_GHCR_TOKEN:-}" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
            export GH_TOKEN="$IAC_BOOTSTRAP_GHCR_TOKEN"
            deadline=$(( $(date +%s) + 1800 ))   # 30 min budget
            while true; do
              if gh api -H "Accept: application/vnd.github+json" \
                   /user/packages/container/migrate/versions \
                   --jq ".[].metadata.container.tags[]" 2>/dev/null \
                   | grep -qx "latest"; then
                echo "✓ ghcr.io/eduvhc/migrate:latest is available"
                break
              fi
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "✗ ghcr.io/eduvhc/migrate:latest still missing after 30 min — abort"
                exit 1
              fi
              echo "ghcr.io/eduvhc/migrate:latest not yet pushed — waiting 30s"
              sleep 30
            done
          '

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install OpenTofu
        # Stage 3 reads `hetzner_ipv4` via `tofu output -raw` so it can
        # SSH to the box (menu-db-migrations + openobserve-dashboards).
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      - name: tofu init (backend setup for tofu output)
        # `tofu output -raw <name>` requires the s3 backend to be
        # initialized. infra-deploy.yml initialized state during apply,
        # but this is a fresh runner — we need our own backend init.
        # -lock-timeout=5m to coexist gracefully with an apply that
        # might be in-flight on another runner.
        run: bin/iedora-env tofu -chdir=infra/iac/tofu init -input=false -upgrade -lock-timeout=5m

      - uses: ./.github/actions/infra/ssh-setup
        with:
          bws-access-token: ${{ secrets.BWS_ACCESS_TOKEN }}

      - name: bin/iedora app apply
        env:
          # Configurators read IMAGE_SHA via os.Getenv (default "latest")
          # — see infra/app-state/{core,menu}-db-migrations/main.go.
          # Pass the dispatch input through so the migrators pull the
          # SAME tag we just verified above.
          IMAGE_SHA: ${{ inputs.image_sha }}
        run: bin/iedora-env bin/iedora app apply
