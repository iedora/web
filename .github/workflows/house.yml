# House CD — Astro static site → Cloudflare Workers Static Assets.
#
# Thin dispatcher: this workflow exists for the per-product trigger
# (push on `products/house/**` etc.), but the actual deploy logic lives
# in the reusable `deploy.yml`. `task deploy:house` invokes the
# `cloudflareWorker` runtime which runs `bun run build` + `tofu apply`
# on `products/house/infra/tofu/`.
#
# Adding a new CF Workers product follows the same shape: copy this
# file, swap the paths-filter, swap the product input. No deploy.yml
# changes.

name: House

on:
  push:
    branches: [main]
    paths:
      - 'products/house/**'
      - 'packages/design-system/**'
      - 'bun.lock'
      - '.github/workflows/house.yml'
  workflow_dispatch: {}

concurrency:
  group: house
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      product: house
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      IAC_BOOTSTRAP_SSH_PRIVATE_KEY: ${{ secrets.IAC_BOOTSTRAP_SSH_PRIVATE_KEY }}
