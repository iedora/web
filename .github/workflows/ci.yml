# Continuous integration — orchestrator.
#
# Structure (industry-standard for a Bun-workspaces monorepo):
#
#   1. `changes` — dorny/paths-filter detects which workspaces moved.
#   2. Per-concern jobs (typecheck-menu, lint-menu) — gated on changes.
#   3. Per-workspace unit jobs — delegated to `_unit.yml` reusable workflow.
#   4. `e2e` — delegated to `_e2e.yml` reusable workflow, gates on units.
#
# Workspace shared-setup (Bun install at repo root) lives ONCE in
# `.github/actions/setup`. Job-level boilerplate stays here only because
# `if:` + `needs:` orchestration is the orchestrator's job.
#
# Adding a new workspace:
#   - add one filter entry to the `changes` job
#   - add one `uses: ./.github/workflows/_unit.yml` block below
#
# No new file. No copy-pasted setup.
#
# Pattern reference: vercel/next.js + t3-oss/create-t3-turbo + dorny/paths-filter.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # 1. Detect which workspaces changed
  # -------------------------------------------------------------------------
  changes:
    name: Detect changed workspaces
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      menu: ${{ steps.filter.outputs.menu }}
      genkan: ${{ steps.filter.outputs.genkan }}
      house: ${{ steps.filter.outputs.house }}
      identity: ${{ steps.filter.outputs.identity }}
      authtestkit: ${{ steps.filter.outputs.authtestkit }}
      design-system: ${{ steps.filter.outputs.design-system }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Each filter emits `outputs.<name>` = "true" when any matching
          # path changed in this push/PR. `shared` covers files that
          # invalidate every workspace (workspace lockfile, repo-level
          # config, the CI machinery itself).
          filters: |
            menu:
              - 'products/menu/**'
            genkan:
              - 'products/genkan/**'
            house:
              - 'products/house/**'
            identity:
              - 'packages/iedora-identity/**'
            authtestkit:
              - 'packages/iedora-auth-testkit/**'
            design-system:
              - 'packages/design-system/**'
            shared:
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig*.json'
              - '.github/**'

  # -------------------------------------------------------------------------
  # 2. Per-concern jobs
  # -------------------------------------------------------------------------
  typecheck-menu:
    name: Typecheck · menu
    needs: changes
    if: needs.changes.outputs.menu == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.design-system == 'true' || needs.changes.outputs.identity == 'true' || needs.changes.outputs.authtestkit == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  typecheck-genkan:
    name: Typecheck · genkan
    needs: changes
    if: needs.changes.outputs.genkan == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.design-system == 'true' || needs.changes.outputs.identity == 'true' || needs.changes.outputs.authtestkit == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/genkan
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint-menu:
    name: Lint · menu
    needs: changes
    if: needs.changes.outputs.menu == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.design-system == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: bun run lint

  # -------------------------------------------------------------------------
  # 3. Per-workspace unit jobs (matrix-style via reusable workflow)
  # -------------------------------------------------------------------------
  unit-menu:
    needs: changes
    if: needs.changes.outputs.menu == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.design-system == 'true' || needs.changes.outputs.identity == 'true' || needs.changes.outputs.authtestkit == 'true'
    uses: ./.github/workflows/_unit.yml
    with:
      label: Unit · menu
      workdir: products/menu

  unit-genkan:
    needs: changes
    # genkan tests depend on auth-testkit + identity, so a change in either
    # of those re-runs genkan's suite as well.
    if: needs.changes.outputs.genkan == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.identity == 'true' || needs.changes.outputs.authtestkit == 'true' || needs.changes.outputs.design-system == 'true'
    uses: ./.github/workflows/_unit.yml
    with:
      label: Unit · genkan
      workdir: products/genkan

  unit-identity:
    needs: changes
    if: needs.changes.outputs.identity == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/_unit.yml
    with:
      label: Unit · @iedora/identity
      workdir: packages/iedora-identity
      timeout-minutes: 5

  unit-authtestkit:
    needs: changes
    # auth-testkit re-exports genkan's schema + plugins, so any genkan or
    # identity change must re-run its suite.
    if: needs.changes.outputs.authtestkit == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.genkan == 'true' || needs.changes.outputs.identity == 'true'
    uses: ./.github/workflows/_unit.yml
    with:
      label: Unit · @iedora/auth-testkit
      workdir: packages/iedora-auth-testkit

  # -------------------------------------------------------------------------
  # 4. E2E gate (only when menu or its deps moved)
  # -------------------------------------------------------------------------
  # `if:` uses `!failure() && !cancelled()` instead of plain `success()` so
  # the job still runs when an upstream was skipped (paths-filter
  # short-circuited it). `success()` would block the e2e whenever any unit
  # job is skipped — which is the normal case for a docs-only change to
  # menu, where typecheck/lint/unit-menu run but the others don't.
  e2e:
    name: E2E (Playwright)
    needs: [changes, typecheck-menu, typecheck-genkan, lint-menu, unit-menu, unit-genkan, unit-identity, unit-authtestkit]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.changes.outputs.menu == 'true' ||
       needs.changes.outputs.shared == 'true' ||
       needs.changes.outputs.identity == 'true' ||
       needs.changes.outputs.authtestkit == 'true' ||
       needs.changes.outputs.design-system == 'true')
    uses: ./.github/workflows/_e2e.yml
    secrets: inherit
