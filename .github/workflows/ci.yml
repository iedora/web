# Continuous integration for meta-menu.
#
# Four jobs: typecheck, lint, and unit run on every push (fast, parallel);
# e2e gates merges and only runs once the cheap jobs are green so a broken
# branch doesn't burn ~10 min of runner time before failing.
#
# Runtime split (see AGENTS.md): Bun for installs and script orchestration,
# Node for `next build` and `next start`. Bun + `next build` is unstable as
# of 2026 (oven-sh/bun#23944), and CI must mirror production runtime anyway.
# Vitest is invoked via `bun run test` so the `vitest` binary's Node shebang
# takes over — testcontainers (used by the real-Redis integration suite)
# doesn't currently work under Bun's runtime (oven-sh/bun#21342).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.13'
  NODE_VERSION: '22'
  PLAYWRIGHT_VERSION: '1.59.1'

# All jobs operate on the menu product (the only one with code right now).
# `defaults.run.working-directory` is set per-job below — that's the level
# GH Actions accepts; setting it at the workflow level doesn't apply
# inherited defaults to `services:` / cache `path:` keys anyway.

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies (workspace root)
        working-directory: .
        run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/menu
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies (workspace root)
        working-directory: .
        run: bun install --frozen-lockfile
      - run: bun run lint

  unit-menu:
    name: Unit · menu (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/menu
    # ubuntu-24.04 runners ship Docker Engine, which testcontainers needs
    # for the real-Redis integration suite. No extra setup required.
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies (workspace root)
        working-directory: .
        run: bun install --frozen-lockfile
      - name: Run Vitest
        # `bun run test` invokes the `vitest` binary which uses a Node shebang,
        # so testcontainers' `@testcontainers/*` modules run under Node here
        # (they fail under Bun's runtime — see oven-sh/bun#21342).
        run: bun run test

  unit-genkan:
    name: Unit · genkan (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/genkan
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies (workspace root)
        working-directory: .
        run: bun install --frozen-lockfile
      - name: Run Vitest
        run: bun run test

  unit-identity:
    name: Unit · @iedora/identity (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: packages/iedora-identity
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies (workspace root)
        working-directory: .
        run: bun install --frozen-lockfile
      - name: Run Vitest
        run: bun run test

  unit-authtestkit:
    name: Unit · @iedora/auth-testkit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/iedora-auth-testkit
    # Boots a real Better Auth instance against PGLite + walks the OIDC
    # handshake. Slower than the other unit jobs but still under 30s.
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies (workspace root)
        working-directory: .
        run: bun install --frozen-lockfile
      - name: Run Vitest
        run: bun run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: [typecheck, lint, unit-menu, unit-genkan, unit-identity, unit-authtestkit]
    defaults:
      run:
        working-directory: products/menu

    services:
      # `POSTGRES_DB` stays as the default `postgres` admin DB — the e2e
      # global-setup connects to it to CREATE the `metamenu_test` DB.
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      # LocalStack stands in for MinIO/S3 in CI because:
      #   - GH Actions services don't accept a `command:` override, so
      #     `minio/minio` (needs `server /data`) can't boot.
      #   - The public `minio/minio` and `bitnami/minio` images were both
      #     removed from Docker Hub in 2025 (MinIO 2025-10-23, Bitnami
      #     2025-08-28 catalog collapse) — there is no current "drop-in"
      #     MinIO image with a self-booting entrypoint.
      # LocalStack auto-boots S3 on :4566; the SDK works as long as the
      # client is created with `forcePathStyle: true` (it already is in
      # `src/features/upload/adapters/s3.ts`). Local dev still uses the real
      # `minio/minio` from docker-compose while its cached tag pulls.
      localstack:
        image: localstack/localstack:4
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - '4566:4566'
        options: >-
          --health-cmd "curl -fsS http://localhost:4566/_localstack/health | grep -q 's3'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/metamenu_test
      # CI-only secret; production uses the value set in repo Secrets.
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: http://localhost:3000
      DISABLE_AUTH_RATE_LIMIT: 'true'
      DISABLE_RATE_LIMIT: 'true'
      # LocalStack accepts any credentials; we use the conventional `test/test`
      # pair the AWS SDK uses for local development.
      S3_ENDPOINT: http://localhost:4566
      S3_REGION: us-east-1
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      S3_BUCKET: metamenu-test
      NEXT_TELEMETRY_DISABLED: '1'
      CI: 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          # Turbopack's persistent cache lives here in Next 16 — large saving
          # on warm runs. Keying on source files invalidates when code changes.
          # Path is repo-root-relative; actions/cache doesn't honour the job's
          # `defaults.run.working-directory`.
          path: products/menu/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('products/menu/src/**/*.ts', 'products/menu/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers (cold cache)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (warm cache)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Create test database
        # The service container starts with the default `postgres` DB;
        # globalSetup expects to be able to connect there AND have
        # `metamenu_test` to migrate against.
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "CREATE DATABASE metamenu_test;"

      - name: Bootstrap S3 bucket
        # LocalStack starts with zero buckets. `aws` CLI v2 is preinstalled on
        # ubuntu-24.04 runners; no install step needed.
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws --endpoint-url=http://localhost:4566 s3 mb s3://metamenu-test
          aws --endpoint-url=http://localhost:4566 s3api put-bucket-acl \
            --bucket metamenu-test --acl public-read

      - name: Build Next.js
        # Node, not Bun — production runtime parity + AGENTS.md guidance.
        # `node --run` is the Node 22+ way to invoke a package.json script.
        run: node --run build

      - name: Run Playwright
        # playwright.config.ts skips its own `build` step when CI=true,
        # so this only launches `next start` + runs the suite.
        run: bunx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces, screenshots, and videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
