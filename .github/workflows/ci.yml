# Pipeline — 6 jobs with path-based change detection.
#
#   changes      → detects what changed (code / docker)
#   correctness  → typecheck + lint + test (only if code changed)
#   security     → gitleaks + hadolint + osv-scanner (always on PR/push/cron)
#   image        → build + push to ghcr.io/iedora/frontend (push on main; PR only builds)
#                  with GHA cache, provenance + SBOM, cosign signature + attestation.
#                  Gated: runs only when code/docker actually changed, and only
#                  after correctness + security pass — a red run can never push,
#                  and a docs-only push to main no longer republishes the image.
#   ci-ok        → fan-in gate; the ONLY job to mark as a required status check
#                  (it always runs, tolerates legitimately skipped legs, fails
#                  on any failure/cancellation).
#   notify-infra → on a main publish, dispatch image-published to iedora/infra
#                  so it bumps the pinned digest and redeploys (event-driven CD).
#
# The weekly cron runs only `security` (changes/correctness/image skip via `if:`)
# — catches new CVEs without needing a push. workflow_dispatch force-publishes
# regardless of change detection (escape hatch for cache/base-image rebuilds).
#
# Action pins (Node 24 runtime — Node 20 deprecation rolling 2026):
#   actions/checkout@v6.0.3       (2026-01-09)
#   oven-sh/setup-bun@v2.2.0      (2026-03-14, auto-caches ~/.bun/install/cache)
#   dorny/paths-filter@v4.0.1     (2026-03-17)
#   hadolint/hadolint-action@v3.3.0
#   docker/setup-buildx-action@v4.1.0  docker/login-action@v4.2.0
#   docker/metadata-action@v6.1.0      docker/build-push-action@v7.2.0
#   sigstore/cosign-installer@v4.1.2
#   actions/attest-build-provenance@v4.1.0
#   gitleaks 8.30.1, osv-scanner 2.3.8

name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:  # manual image rebuild/publish, bypassing change detection

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Path filter. `correctness` gates on `code`. `security` ignores it.
  # ─────────────────────────────────────────────────────────────────
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.f.outputs.code }}
      docker: ${{ steps.f.outputs.docker }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/package.json'
              - 'bun.lock'
              - '**/tsconfig*.json'
              - '**/vitest.config.*'
              - '**/eslint.config.*'
            docker:
              - '**/Dockerfile'

  # ─────────────────────────────────────────────────────────────────
  # typecheck + lint + test. setup-bun@v2.2 auto-caches
  # ~/.bun/install/cache — no manual actions/cache.
  # ─────────────────────────────────────────────────────────────────
  correctness:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    concurrency:
      group: correctness-${{ github.ref }}
      # Cancelling a main run mid-pipeline would block that commit's image job
      # (its gate sees correctness as cancelled) — only supersede PR runs.
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  # ─────────────────────────────────────────────────────────────────
  # gitleaks (history scan) + hadolint (Dockerfile lint) + osv-scanner
  # (lockfile CVEs). hadolint-action emits annotations natively; OSV
  # uses gh-annotations format. The gitleaks binary avoids the
  # GITLEAKS_LICENSE of the official action (gated on org repos).
  # ─────────────────────────────────────────────────────────────────
  security:
    concurrency:
      group: security-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.30.1
      OSV_VERSION: 2.3.8
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0  # gitleaks scans the whole history

      - name: gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --baseline-path .gitleaks-baseline.json \
            --redact --verbose --no-banner --exit-code 1

      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: apps/web/Dockerfile
          failure-threshold: error  # warnings annotate, don't block

      - name: osv-scanner
        run: |
          curl -fsSL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x osv-scanner
          ./osv-scanner --lockfile=bun.lock --format gh-annotations

  # ─────────────────────────────────────────────────────────────────
  # Build the deployable image and push to GHCR. Pushes only on `main`;
  # PRs build (validating the Dockerfile) without pushing. linux/amd64
  # (single swarm node). NEXT_PUBLIC_* bake from productUrl()'s canonical
  # fallback — apps/web/.env is excluded by .dockerignore, so prod URLs
  # land in the bundle automatically. Consumed by iedora/infra's frontend role.
  # ─────────────────────────────────────────────────────────────────
  # Gating rules (each clause closes a real publish-despite-failure hole):
  #  - !cancelled() replaces the implicit success(), which would skip this job
  #    whenever correctness is legitimately path-skipped (e.g. Dockerfile-only
  #    change) — but we still check each dependency's result explicitly below.
  #  - correctness must be success or skipped (skipped = no code changed);
  #    failed or cancelled correctness blocks the image.
  #  - security must be success, full stop.
  #  - something relevant must actually have changed (code or docker filter) —
  #    a docs-only push to main no longer rebuilds and republishes the image.
  #    workflow_dispatch bypasses change detection as the manual escape hatch.
  image:
    needs: [changes, correctness, security]
    if: >-
      ${{ !cancelled() &&
          github.event_name != 'schedule' &&
          (needs.changes.outputs.code == 'true' || needs.changes.outputs.docker == 'true' || github.event_name == 'workflow_dispatch') &&
          (needs.correctness.result == 'success' || needs.correctness.result == 'skipped') &&
          needs.security.result == 'success' }}
    concurrency:
      group: image-${{ github.ref }}
      # Never cancel a main publish mid-push (could strand a half-tagged image).
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write       # push to GHCR
      id-token: write       # keyless attestation signing
      attestations: write   # write the provenance attestation
    env:
      IMAGE: ghcr.io/iedora/frontend
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEPLOYMENT_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # Keyless cosign signature on the pushed digest. The infra `frontend` role
      # gates deploys on `cosign verify` (fail-closed) before `docker stack
      # deploy`, so the image MUST carry a cosign signature — a provenance
      # attestation alone is verified differently and would not satisfy it.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ─────────────────────────────────────────────────────────────────
  # Fan-in gate. Make THIS the only required status check: a job-level
  # skip reports Success, but a workflow- or job-skip on an individually
  # required check would leave PRs stuck on "Expected" forever. ci-ok
  # always runs, treats "skipped" as legitimate (path filter said no),
  # and fails on any failure or cancellation upstream.
  # ─────────────────────────────────────────────────────────────────
  ci-ok:
    needs: [changes, correctness, security, image]
    if: ${{ !cancelled() && github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All jobs green or legitimately skipped
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -e 'all(.[]; .result == "success" or .result == "skipped")'

  # Tell iedora/infra a new frontend image exists, so infra bumps the pinned
  # digest and redeploys — event-driven, within seconds of the build rather than
  # at the next Renovate poll. Not part of ci-ok (it's a post-publish side effect,
  # never a PR gate). Skips cleanly (warning, not failure) if the PAT is unset.
  notify-infra:
    needs: image
    if: ${{ github.event_name != 'pull_request' && needs.image.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: read   # imagetools inspect reads the just-pushed image
    steps:
      - name: Gate on the dispatch token
        id: gate
        env:
          TOKEN: ${{ secrets.IEDORA_GITOPS_PAT }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::IEDORA_GITOPS_PAT not set — skipping infra dispatch (image still published)"
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.gate.outputs.ok == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve the published digest
        if: steps.gate.outputs.ok == 'true'
        id: resolve
        run: |
          # Resolve from the registry rather than a job output: the image job's
          # digest output does not propagate reliably across jobs. This is the
          # index digest cosign signed and what infra cosign-verifies on deploy.
          digest=$(docker buildx imagetools inspect ghcr.io/iedora/frontend:latest --format '{{.Manifest.Digest}}')
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "::error::bad digest '$digest'"; exit 1; }
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Dispatch image-published to iedora/infra
        if: steps.gate.outputs.ok == 'true'
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.IEDORA_GITOPS_PAT }}
          repository: iedora/infra
          event-type: image-published
          client-payload: |
            {"repo": "${{ github.repository }}", "sha": "${{ github.sha }}", "bumps": [{"role": "frontend", "key": "frontend", "digest": "${{ steps.resolve.outputs.digest }}"}]}
