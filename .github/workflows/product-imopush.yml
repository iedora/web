# @iedora/product-imopush CI.
#
# Scaffold only today — typecheck + lint + vitest (passWithNoTests
# until slices land). Same shape as product-menu.yml minus the
# Playwright E2E + production-build jobs (those wire up when imopush
# starts serving routes from apps/web).

name: '[product:imopush] CI'

on:
  # Quality gate — PR + merge queue only. Main is PR-only protected, so
  # a push:main run would just duplicate the PR run that already passed.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'products/imopush/**'
      - 'packages/db/**'
      - 'packages/eslint-config/**'
      - '.github/workflows/product-imopush.yml'
      - '.github/actions/setup/**'
  merge_group:
  workflow_dispatch:

concurrency:
  group: product-imopush-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/imopush
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: products/imopush
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run lint

  unit:
    name: Unit (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: products/imopush
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun run test
