# CodeQL SAST — GitHub's first-party static analysis.
#
# Complements Trivy (which is purely SCA — known CVEs in dependencies)
# by catching application-level vulns: SQL injection, XSS, prototype
# pollution, hardcoded crypto, taint flow from user input → exec, etc.
#
# Findings appear in the Security tab → Code scanning, grouped per
# language. The `language` matrix is one entry today (TS+JS combined)
# but stays a matrix so adding (say) `go` later is a one-line change.
#
# Paths filter (paths-ignore only):
#   SAST signal lives in cross-cutting taint flow — a vuln in a shared
#   package can surface only when reached from a product's entrypoint,
#   so partial scans by source-file globs miss reachable findings.
#   That argues against any INCLUDE filter. We do exclude pure-docs
#   paths though — a README / changelog / .gitignore edit can't
#   introduce a code vuln, and the weekly cron picks up anything we'd
#   miss between code-bearing commits.

name: '[Security] CodeQL'

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - '.editorconfig'
  schedule:
    # Monday 04:30 UTC — aligned with Renovate's weekly window so the
    # security signal lands on the same morning Eduardo reviews PRs.
    - cron: '30 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        # `javascript-typescript` covers both .ts and .js in one analysis
        # run — CodeQL's native combined language since 2024. Splitting
        # them gains nothing and doubles the runtime.
        language: ['javascript-typescript']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds queries beyond the default suite
          # (e.g. clear-text logging, weak crypto defaults). Some false-
          # positive risk but solo-project — easier to triage than miss.
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: '/language:${{ matrix.language }}'
