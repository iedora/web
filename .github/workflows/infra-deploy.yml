# Stage 2 (IaC) — plain `tofu apply` against `infra/iac/tofu/`.
#
# What this workflow OWNS:
#   - Hetzner VPS, firewall, SSH key
#   - Cloudflare R2 buckets, DNS records, API tokens
#   - GitHub Actions config (via the github provider)
#   - The rendered docker-compose stack on the box (delivered via cloud-
#     init on first boot, then `terraform_data.iedora_sync` on day-2)
#
# What this workflow does NOT own:
#   - Zitadel app config (org, project, OIDC app, action targets…) — that's
#     `app-state.yml` (Stage 3).
#   - Per-product containers — that's `deploy.yml` (Stage 4).

name: '[Deploy] Infra'

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'infra/iac/**'
      - 'internal/**'
      - 'bin/state-bucket-bootstrap'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/infra-deploy.yml'

# Never cancel mid-apply — partial applies leave the encrypted tfstate
# half-written. Queue subsequent runs instead.
concurrency:
  group: infra-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    name: '[Deploy] Tofu apply'
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    permissions:
      contents: read
      id-token: write   # reserved for future Sigstore plan attestations

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}

    steps:
      - name: Checkout @ ${{ github.sha }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Install Go
        # Needed for `go run`-style execution of `bin/bws-sync` (called
        # by Tofu's `terraform_data.bws_sync` local-exec provisioner) and
        # `bin/state-bucket-bootstrap` (Stage -1).
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install OpenTofu
        # Pin to the laptop's current major.minor (1.12.x). Bumping
        # without aligning the laptop first can corrupt the encrypted
        # state file (schema diffs between versions).
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      - name: Install rclone
        # Required by the R2 bucket destroy-time hooks
        # (`terraform_data.{data,assets}_bucket_purge`). Apt-get is
        # plenty fast on the runner.
        run: sudo apt-get update -qq && sudo apt-get install -yqq rclone

      - name: state-bucket-bootstrap (Day-1 mints, Day-2 no-op)
        # Idempotent: if BWS already has the 3 IAC_BOOTSTRAP_TOFU_STATE_*
        # keys + the CF token matches the access_key, exits 0 silently.
        # First-ever run mints the R2 bucket + scoped token + writes BWS.
        # Same binary the operator runs locally before `tofu init`.
        run: bin/iedora-env bin/state-bucket-bootstrap

      - name: tofu init
        run: bin/iedora-env tofu -chdir=infra/iac/tofu init -input=false -upgrade

      - name: Write SSH key for terraform_data.iedora_sync
        # Single source of truth: the key in BWS (IAC_BOOTSTRAP_SSH_PRIVATE_KEY).
        # `bin/iedora-env` hydrates it as an env var; we just need it on disk
        # for the system ssh client that Tofu's SSH lib + Stage 3/4 configurators
        # shell out to. NOT a separate GH Actions secret.
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          bin/iedora-env bash -c 'printf "%s\n" "$IAC_BOOTSTRAP_SSH_PRIVATE_KEY"' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'StrictHostKeyChecking accept-new\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: tofu apply
        env:
          TF_CLI_ARGS_apply: "-json-into=${{ runner.temp }}/tf-apply.json"
        run: bin/iedora-env tofu -chdir=infra/iac/tofu apply -input=false -auto-approve

      - name: Upload tofu apply JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tofu-apply-json
          path: ${{ runner.temp }}/tf-apply.json
          if-no-files-found: ignore
          retention-days: 30
