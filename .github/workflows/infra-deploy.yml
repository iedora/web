# Stage 2 (IaC) — provisions / reconciles the SHARED infra estate.
#
# Two jobs in series:
#
#   1. build_pg_backup_image — builds + pushes
#      `ghcr.io/eduvhc/infra-pg-backup:18` (one of the SHARED compose
#      services). The Hetzner box's iedora.service refuses to start
#      without this image in GHCR; folding the build into this
#      workflow eliminates the Day-1 ordering footgun (a separate
#      [infra-pg-backup] workflow that had to be dispatched first).
#
#   2. apply — `tofu apply` against `infra/iac/tofu/`. Provisions
#      Hetzner VPS, CF R2 + DNS + Tunnel, the rendered docker-compose
#      stack on the box.
#
# What this workflow OWNS:
#   - Hetzner VPS, firewall, SSH key
#   - Cloudflare R2 buckets, DNS records, API tokens
#   - GitHub Actions config (via the github provider)
#   - The rendered docker-compose stack on the box
#   - `ghcr.io/eduvhc/infra-pg-backup:18` image
#
# What this workflow does NOT own:
#   - DB migrations + OO dashboards — `app-state.yml` (Stage 3).
#   - Per-product containers (web image, deploy to box) — `web.yml`
#     and `deploy.yml` (Stage 4).

name: '[infra] Deploy'

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'infra/iac/**'
      - 'internal/**'
      - 'bin/state-bucket-bootstrap'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/infra-deploy.yml'
      # infra-pg-backup is part of the infra estate now (folded in).
      # Paths that affect that image trigger this workflow too.
      - '.github/actions/setup/**'

# Never cancel mid-apply — partial applies leave the encrypted tfstate
# half-written. Queue subsequent runs instead.
concurrency:
  group: infra-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Stage 2.0: build the infra-pg-backup image ─────────────────────────────
  # iedora.service won't start without this image in GHCR (compose
  # `docker compose up -d` errors with "failed to resolve reference"
  # if it's missing). Same arm64 runner + bin/iedora-env login as
  # apps/web's build.
  build_pg_backup_image:
    name: Build infra-pg-backup image (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-aarch64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Log in to GHCR
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          bin/iedora-env bash -c '
            set -euo pipefail
            [ -n "${IAC_BOOTSTRAP_GHCR_TOKEN:-}" ] || { echo "IAC_BOOTSTRAP_GHCR_TOKEN missing in BWS" >&2; exit 1; }
            echo "$IAC_BOOTSTRAP_GHCR_TOKEN" | docker login ghcr.io -u eduvhc --password-stdin
          '

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/iac/cmd/infra-pg-backup/Dockerfile
          platforms: linux/arm64
          tags: |
            ghcr.io/eduvhc/infra-pg-backup:18
            ghcr.io/eduvhc/infra-pg-backup:${{ github.sha }}
          push: true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=infra-pg-backup-arm64
          cache-to: type=gha,mode=max,scope=infra-pg-backup-arm64

      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/eduvhc/infra-pg-backup
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ── Stage 2.1: tofu apply ─────────────────────────────────────────────────
  apply:
    name: Tofu apply
    needs: build_pg_backup_image
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    permissions:
      contents: read
      id-token: write   # reserved for future Sigstore plan attestations

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}

    steps:
      - name: Checkout @ ${{ github.sha }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Install Go
        # Needed for `go run`-style execution of `bin/bws-sync` (called
        # by Tofu's `terraform_data.bws_sync` local-exec provisioner) and
        # `bin/state-bucket-bootstrap` (Stage -1).
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install OpenTofu
        # Pin to the laptop's current major.minor (1.12.x). Bumping
        # without aligning the laptop first can corrupt the encrypted
        # state file (schema diffs between versions).
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      - name: Install rclone
        # Required by the R2 bucket destroy-time hooks
        # (`terraform_data.{data,assets}_bucket_purge`). Apt-get is
        # plenty fast on the runner.
        run: sudo apt-get update -qq && sudo apt-get install -yqq rclone

      - name: state-bucket-bootstrap (Day-1 mints, Day-2 no-op)
        # Idempotent: if BWS already has the 3 IAC_BOOTSTRAP_TOFU_STATE_*
        # keys + the CF token matches the access_key, exits 0 silently.
        # First-ever run mints the R2 bucket + scoped token + writes BWS.
        # Same binary the operator runs locally before `tofu init`.
        run: bin/iedora-env bin/state-bucket-bootstrap

      - name: tofu init
        # -lock-timeout=5m: if the previous CI run died mid-apply and
        # left a state lock, wait up to 5 min for it to release instead
        # of failing immediately. The pipeline's own concurrency guard
        # (above) prevents two infra-deploys overlapping intentionally,
        # so any lock seen here is provably stale or natural drain time.
        run: bin/iedora-env tofu -chdir=infra/iac/tofu init -input=false -upgrade -lock-timeout=5m

      - name: Write SSH key for terraform_data.iedora_sync
        # Single source of truth: the key in BWS (IAC_BOOTSTRAP_SSH_PRIVATE_KEY).
        # `bin/iedora-env` hydrates it as an env var; we just need it on disk
        # for the system ssh client that Tofu's SSH lib + Stage 3/4 configurators
        # shell out to. NOT a separate GH Actions secret.
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          bin/iedora-env bash -c 'printf "%s\n" "$IAC_BOOTSTRAP_SSH_PRIVATE_KEY"' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'StrictHostKeyChecking accept-new\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: tofu apply
        env:
          TF_CLI_ARGS_apply: "-json-into=${{ runner.temp }}/tf-apply.json"
        run: bin/iedora-env tofu -chdir=infra/iac/tofu apply -input=false -auto-approve -lock-timeout=5m

      - name: Upload tofu apply JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tofu-apply-json
          path: ${{ runner.temp }}/tf-apply.json
          if-no-files-found: ignore
          retention-days: 30
