# Stage 2 (IaC) — `task infra:up` against `infra/tofu/`.
#
# What this workflow OWNS:
#   - Hetzner VPS, firewall, SSH key
#   - Cloudflare R2 buckets, DNS records, API tokens
#   - GitHub Actions config (via the github provider)
#   - Docker network + named volumes on the box
#   - Shared service containers (postgres, zitadel, zitadel-login, caddy,
#     openobserve, backups). Containers come up with their boot config
#     intact; their *application state* is owned by app-state.yml.
#
# What this workflow does NOT own:
#   - Zitadel app config (org, project, OIDC app, action targets…) — that's
#     `app-state.yml` (Stage 3), which runs after this one via workflow_run.
#   - Menu container — that's `deploy.yml` invoked by `menu.yml` (Stage 4).
#   - House CF Workers script — `house.yml` calls `deploy.yml` directly.
#
# Triggers:
#
#   workflow_dispatch       manual button — the canonical "roll the infra"
#                           lever after editing any `.tf` file.
#   push (paths-filtered)   any change to the iac surface — Tofu source,
#                           orchestrator, with-secrets wrapper.

name: Infra deploy

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'infra/tofu/**'
      - 'infra/modules/**'
      - 'infra/postgres/**'
      - 'infra/cmd/iedora/**'
      - 'infra/cmd/with-secrets/**'
      - 'infra/internal/**'
      - 'infra/bin/iedora'
      - 'infra/bin/with-secrets'
      - 'infra/go.mod'
      - 'infra/go.sum'
      - 'Taskfile.yml'
      - '.github/workflows/infra-deploy.yml'

# Never cancel mid-apply — partial applies leave the encrypted tfstate
# half-written. Queue subsequent runs instead.
concurrency:
  group: infra-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    name: task infra:up
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    permissions:
      contents: write   # commit encrypted tfstate back after apply
      id-token: write   # reserved for future Sigstore plan attestations

    env:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ vars.BWS_PROJECT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout @ ${{ github.sha }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}

      - name: Install bws CLI
        env:
          BWS_VERSION: '2.0.0'
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bws.zip \
            "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
          unzip -q /tmp/bws.zip -d /tmp/bws
          sudo install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Install go-task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version-file: infra/go.mod
          cache: true
          cache-dependency-path: infra/go.sum

      - name: Install OpenTofu
        # Pin to the laptop's current major.minor (1.12.x). Bumping
        # without aligning the laptop first can corrupt the encrypted
        # state file (schema diffs between versions).
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: '1.12.0'
          tofu_wrapper: false

      - name: Read Hetzner IP (existing-box detection)
        # Source of truth is the encrypted tfstate in git. Run a Tofu
        # init + output now (before SSH config) so we can pre-populate
        # known_hosts. Empty output is fine — first apply for a fresh
        # repo provisions the VPS and writes the output.
        id: host
        run: |
          set -euo pipefail
          infra/bin/with-secrets --stage iac -- \
            tofu -chdir=infra/tofu init -upgrade -input=false >/dev/null
          HOST=$(infra/bin/with-secrets --stage iac -- \
            tofu -chdir=infra/tofu output -raw hetzner_ipv4 2>/dev/null || echo "")
          if [ -n "$HOST" ]; then
            echo "::add-mask::$HOST"
            echo "host=$HOST" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH (kreuzwerker/docker provider needs it)
        # The kreuzwerker/docker Tofu provider connects to the Hetzner
        # box over SSH to manage containers. Same key the operator uses
        # from their laptop.
        env:
          SSH_KEY: ${{ secrets.IAC_BOOTSTRAP_SSH_PRIVATE_KEY }}
          HOST: ${{ steps.host.outputs.host }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "$HOST" ]; then
            ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
            chmod 600 ~/.ssh/known_hosts
          fi
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: task infra:up
        # Runs `iedora iac apply` via the Taskfile shim. Internally:
        # Pass 1 (targeted hcloud apply) → Pass 2 (full apply). No more
        # Zitadel TF provider, no placeholder dance, no DNS-override
        # proxy — those went away when Zitadel app state moved to
        # bin/zitadel-apply (handled by app-state.yml after this).
        env:
          # Captures the full apply log for post-mortem inspection.
          TF_CLI_ARGS_apply: "-json-into=${{ runner.temp }}/tf-apply.json"
        run: task infra:up

      - name: Upload tofu apply JSON
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tofu-apply-json
          path: ${{ runner.temp }}/tf-apply.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit encrypted state back to main
        # The encrypted Tofu state IS the source of truth for what
        # exists on Hetzner + CF. Skipping the commit-back leaves git
        # out of sync — the NEXT run starts from stale state and
        # cascades into "resource already exists" conflicts.
        # Idempotent: skips when apply was a no-op (no state diff).
        if: success()
        run: |
          set -euo pipefail
          if git diff --quiet -- infra/tofu/terraform.tfstate; then
            echo "[infra-deploy] no state changes — nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/tofu/terraform.tfstate
          MSG=$(mktemp)
          {
            echo "chore(infra): tfstate updated by CI (${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER})"
            echo ""
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Triggered by: ${GITHUB_EVENT_NAME}"
          } > "$MSG"
          git commit -F "$MSG"
          rm -f "$MSG"
          # One retry on contention — if a human pushed between checkout
          # and now, rebase and try again. Beyond one retry, fail loudly.
          for i in 1 2; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "[infra-deploy] state committed + pushed"
              exit 0
            fi
            echo "[infra-deploy] push attempt $i failed, retrying..."
          done
          echo "[infra-deploy] FAIL: couldn't push state after 2 attempts" >&2
          exit 1
