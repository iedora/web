# Topology drift guard.
#
# Three artefacts are derived from a single Go registry
# (infra/deploy/cmd/iedora/topology.go):
#
#   - infra/iac/tofu/topology.auto.tfvars.json   (Tofu surfaces var)
#   - apps/web/src/generated/surfaces.ts         (proxy.ts host dispatch)
#   - (transitively) apps/web/.env via `iedora local env` (dev only)
#
# `iedora emit-topology --check` re-renders both derived files in
# memory and compares against the on-disk versions; exits 1 on any
# mismatch. Run on every push/PR that touches the registry or the
# generated files — keeps the SoT and its consumers in lockstep.
#
# Fix on red: `go run ./infra/deploy/cmd/iedora emit-topology` and
# commit the regenerated files.

name: '[infra] Topology drift'

on:
  # Quality gate — PR + merge queue only. Main is PR-only protected, so
  # a push:main run would just duplicate the PR run that already passed.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'infra/deploy/cmd/iedora/**'
      - 'infra/iac/tofu/topology.auto.tfvars.json'
      - 'apps/web/src/generated/surfaces.ts'
      - '.github/workflows/topology.yml'
  merge_group:

permissions:
  contents: read

jobs:
  check:
    name: emit-topology --check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go run ./infra/deploy/cmd/iedora emit-topology --check
