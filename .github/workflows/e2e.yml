# Unified E2E (Playwright).
#
# One workflow, one `next build`, every product. The job runs whenever
# any product surface, the shell (apps/web), or a shared package
# changes; the `detect` step inspects the diff to pick which Playwright
# projects (menu / core / imopush) actually run, so a PR touching only
# `products/core/` doesn't pay for the menu specs.
#
# Per-shard DB isolation is wired in `products/<p>/src/shared/testing/
# e2e-db.ts::workerDatabaseUrl` (E2E_ISOLATE_WORKERS=1). The shard
# matrix is parked at a single shard today and bumped when the suite
# crosses ~10 min.

name: '[e2e] CI'

on:
  # Quality gate — runs only on PRs (main is PR-only protected) and on
  # the merge queue's transient ref. Paths cover the runtime: the shell,
  # every product, every workspace package the shell loads at request
  # time. `packages/eslint-config` is lint-only and intentionally omitted.
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'products/**'
      - 'packages/auth/**'
      - 'packages/brand/**'
      - 'packages/db/**'
      - 'packages/design-system/**'
      - 'packages/iedora-observability/**'
      - 'packages/product-core/**'
      - 'bun.lock'
      - '.github/workflows/e2e.yml'
      - '.github/actions/setup/**'
  merge_group:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect projects
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      projects: ${{ steps.pick.outputs.projects }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: pick
        shell: bash
        run: |
          # PR diff against the merge-base; push uses the previous commit.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # First push to a new branch may not have `before` — fall back to all.
          if ! git cat-file -e "$base" 2>/dev/null; then
            echo "projects=--project=menu --project=core --project=imopush" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$base" "$head")
          echo "Changed paths:" && echo "$changed"

          # Shared changes ⇒ run everything.
          if echo "$changed" | grep -qE '^(apps/web/|packages/|\.github/workflows/e2e\.yml|\.github/actions/setup/|bun\.lock)'; then
            echo "projects=--project=menu --project=core --project=imopush" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Otherwise pick by product folder.
          flags=()
          echo "$changed" | grep -q '^products/menu/'    && flags+=(--project=menu)
          echo "$changed" | grep -q '^products/core/'    && flags+=(--project=core)
          echo "$changed" | grep -q '^products/imopush/' && flags+=(--project=imopush)
          if [[ ${#flags[@]} -eq 0 ]]; then
            echo "No relevant changes detected; skipping run."
            echo "projects=" >> "$GITHUB_OUTPUT"
          else
            echo "projects=${flags[*]}" >> "$GITHUB_OUTPUT"
          fi

  run:
    name: Run (${{ matrix.shard }})
    needs: detect
    if: needs.detect.outputs.projects != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/1']
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: Password1!
          POSTGRES_DB: menu_test
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      s3mock:
        image: adobe/s3mock:latest
        env:
          initialBuckets: menu-test
        ports: [9090:9090]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Wait for S3Mock + create bucket
        shell: bash
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9090/ >/dev/null 2>&1; then
              echo "S3Mock ready"; break
            fi
            sleep 1
          done
          curl -fsS -X PUT http://localhost:9090/menu-test
          echo "menu-test bucket ready"

      - name: Apply DB migrations (core + product schemas)
        working-directory: apps/web
        run: bun run db:migrate:test

      - name: Install Playwright browsers
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Build apps/web (production)
        working-directory: apps/web
        run: bun run build:test

      - name: Run Playwright
        working-directory: apps/web
        env:
          CI: 'true'
        run: |
          bun run test:e2e -- \
            ${{ needs.detect.outputs.projects }} \
            --grep-invert "@flaky" \
            --shard=${{ matrix.shard }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: apps/web/playwright-report
          retention-days: 14
