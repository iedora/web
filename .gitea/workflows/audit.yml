# Security audit — corre em paralelo ao ci.yml. Single job, 3 tools
# em série (cada ~5-10s). Binários pinned por versão para mitigar o
# vector de supply chain (Trivy compromise em Março 2026 marcou a
# inflexão: "latest tags são confiança gratuita").
#
# Tools:
#   - gitleaks     secret scan (regex, ~150 patterns)
#   - hadolint     Dockerfile lint
#   - osv-scanner  npm/bun lockfile CVE scan (Google OSV database)
#
# Caching: binários vivem em /var/cache/audit-tools (bind-mount do
# host, mesmo pattern que /var/cache/bun). Install step só faz curl
# se a versão pinned não estiver lá → re-runs típicos saltam download.
#
# Suppressões: ver osv-scanner.toml no root para CVEs known + tracked.

name: audit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Segunda 06:00 UTC — Pesca CVEs que apareceram durante a semana
    # mesmo sem push (osv-scanner cresce com a base, não com o lock).
    - cron: '0 6 * * 1'

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: bun-debian
    timeout-minutes: 10
    container:
      image: oven/bun:1.3-debian
      volumes:
        - /var/cache/audit-tools:/opt/audit-bin
    env:
      GITLEAKS_VERSION: 8.30.1
      HADOLINT_VERSION: 2.14.0
      OSV_VERSION: 2.3.8
      # Não sobre-escrever PATH global aqui — o bun image tem
      # `/usr/local/bun-node-fallback-bin` no fim (necessário para o
      # actions/checkout@v4 encontrar `node`). Cada step que precisa
      # dos audit tools chama-os por caminho absoluto via /opt/audit-bin.
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks --detect varre commits — precisa do histórico.
          # `0` = full clone. Para PRs grandes considerar fetch-depth
          # de 50 + scan apenas dos commits novos via --log-opts.
          fetch-depth: 0

      - name: Restore or install audit binaries
        # Idempotente: cada tool só descarrega se versão actual no cache
        # diferir da pinned. Cache persiste entre runs via bind-mount,
        # típico re-run salta os 3 curls (~10s saved).
        # `shell: bash` porque o `local` + `function` style precisa de
        # bash (act_runner default é `sh -e` em Linux).
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /opt/audit-bin

          need() {
            local bin="$1" version_flag="$2" want="$3"
            [ ! -x "/opt/audit-bin/$bin" ] && return 0
            local have
            have=$("/opt/audit-bin/$bin" "$version_flag" 2>&1 | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
            [ "$have" != "$want" ]
          }

          # oven/bun:1.3-debian não tem curl. Instalamos só se algum
          # tool precisar de download (cache miss). Cold start: ~3-5s
          # para curl + ca-certificates. Re-runs típicos (cache hot):
          # zero — apt nem é invocado.
          install_curl_if_needed() {
            command -v curl >/dev/null && return 0
            echo "→ installing curl + ca-certificates"
            apt-get update -qq >/dev/null
            apt-get install -y --no-install-recommends -qq curl ca-certificates >/dev/null
          }

          if need gitleaks version "$GITLEAKS_VERSION"; then
            install_curl_if_needed
            echo "→ download gitleaks $GITLEAKS_VERSION"
            curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C /opt/audit-bin gitleaks
          fi

          if need hadolint --version "$HADOLINT_VERSION"; then
            install_curl_if_needed
            echo "→ download hadolint $HADOLINT_VERSION"
            curl -fsSL -o /opt/audit-bin/hadolint \
              "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-linux-x86_64"
            chmod +x /opt/audit-bin/hadolint
          fi

          if need osv-scanner --version "$OSV_VERSION"; then
            install_curl_if_needed
            echo "→ download osv-scanner $OSV_VERSION"
            curl -fsSL -o /opt/audit-bin/osv-scanner \
              "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
            chmod +x /opt/audit-bin/osv-scanner
          fi

          /opt/audit-bin/gitleaks version
          /opt/audit-bin/hadolint --version
          /opt/audit-bin/osv-scanner --version

      - name: gitleaks (secret scan — full history, baseline-filtered)
        # --baseline-path: ignora os 23 findings históricos pre-adoção
        # (test fixtures em products/genkan removido, .env antigos, e
        # secrets em dev/tofu state file que foi purged na migração
        # homelab — todos stale). CI bloqueia apenas leaks NOVOS daqui
        # para a frente. Para re-gerar (e.g. depois de purge de história):
        #   gitleaks detect --report-format json --report-path .gitleaks-baseline.json
        # --redact: nunca imprime o secret no log (só o context).
        # --no-banner: limpa output, só o que importa.
        # --exit-code 1: garante fail mesmo que stdout não tenha entries.
        run: /opt/audit-bin/gitleaks detect --baseline-path .gitleaks-baseline.json --redact --verbose --no-banner --exit-code 1

      - name: hadolint (Dockerfile lint)
        # failure-threshold=error → warnings aparecem no log mas não
        # quebram CI. Os 3 warnings actuais (DL3008 sem pin libjemalloc2,
        # DL3003 cd em RUN, DL4006 sem set -o pipefail) são pedantic ou
        # exigem refactor maior. Próxima leva: corrigir DL4006 (real bug
        # — exit code do `npm install … | tail -3` é o do tail).
        run: /opt/audit-bin/hadolint --failure-threshold error apps/web/Dockerfile

      - name: osv-scanner (lockfile CVEs)
        # Picks up osv-scanner.toml do cwd automaticamente.
        # Suppressões known + tracked vivem lá com rationale + review date.
        run: /opt/audit-bin/osv-scanner --lockfile=bun.lock
