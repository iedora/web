# Build + deploy pipeline. Main-only.
#
# 1. `actions/checkout`
# 2. Fetch SSH key + Kamal secrets via BWS_ACCESS_TOKEN (uma única Gitea
#    secret de bootstrap — todas as outras credenciais vivem em BWS).
# 3. `kamal deploy` — Kamal:
#       - builds amd64 nativamente na Beelink (remote builder),
#       - push para Gitea OCI registry,
#       - `.kamal/hooks/pre-deploy` aplica migrations,
#       - blue-green swap só se hook passar.
#
# Substitui: web.yml + deploy.yml + migrate.yml + infra-deploy.yml +
# app-state.yml (5 workflows ⇒ 1).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false   # mid-deploy abort would leave inconsistent state

# Build cache para `kamal deploy` (remote builder) é gerido pelo
# buildkit do builder (na própria Beelink). Não usa actions/cache aqui
# porque o build acontece via docker buildx --builder remote, fora do
# job container. O kamal-remote-ssh--... buildkit container preserva
# cache em volumes Docker entre deploys.

jobs:
  kamal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: System deps (docker-cli, ruby, jq, python3, curl, unzip)
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            ca-certificates curl unzip jq python3 ruby docker.io

      - name: Install Kamal 2.11
        shell: bash
        run: gem install --no-document kamal -v 2.11.0

      - name: Install BWS CLI
        shell: bash
        run: |
          BWS_VER="${BWS_VER:-0.5.0}"
          curl -fsSL "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VER}/bws-x86_64-unknown-linux-gnu-${BWS_VER}.zip" -o /tmp/bws.zip
          unzip -q /tmp/bws.zip -d /tmp/bws
          install -m 0755 /tmp/bws/bws /usr/local/bin/bws

      - name: Bootstrap SSH from BWS
        shell: bash
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          PROJECT_ID=$(bws project list -o json | jq -r '.[0].id')
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          bws secret list "$PROJECT_ID" -o json \
            | python3 -c 'import sys,json; [print(s["value"]) for s in json.loads(sys.stdin.read(), strict=False) if s["key"]=="HOMELAB_SSH_PRIVATE_KEY"]' \
            > ~/.ssh/ci_ed25519
          chmod 600 ~/.ssh/ci_ed25519
          ssh-keyscan -H 192.168.50.53 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Kamal deploy
        shell: bash
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: kamal deploy -d production
