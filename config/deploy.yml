# Kamal base config — shared across destinations.
# Destination-specific (servers, etc.) em `deploy.<destination>.yml`.
# Correr sempre com `-d <destination>` (e.g. `kamal deploy -d production`).
#
# Coexiste com o `infra-web` actual; kamal-proxy publica em host:3001
# para cloudflared ser apontado para lá quando estiver validado.

service: iedora-web

image: eduvhc/web

ssh:
  user: root
  keys:
    - ~/.ssh/ci_ed25519

# Kamal Local Registry (feature nativa 2.8+). `server` começa com
# `localhost` → Kamal spawna automaticamente um container
# `registry:2` no host de build/deploy (Beelink). Localhost endpoints
# são auto-trusted (sem TLS, sem insecure-registries config). Image
# refs ficam `localhost:5000/eduvhc/web:<sha>` — só visíveis no
# Docker daemon do Beelink, não no Gitea UI.
#
# Trade-off vs Gitea registry: perdes histórico no UI, mas eliminas
# todos os workarounds de TLS/buildkit. Para single-host setup é o
# pattern idiomático Kamal.
#
# `username`/`password` são arbitrários — Kamal cria htpasswd interno
# para o registry. Reusamos `KAMAL_REGISTRY_PASSWORD` (Actions secret
# já publicada).
registry:
  server: localhost:5000
  username: kamal
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  # NÃO há `remote:` nem `cache:` aqui — Kamal corre no Beelink, o
  # docker daemon do host já cacheia layers nativamente (single-host
  # setup, sem benefício de cache de registry partilhada). Sem
  # cache.type/options, Kamal usa o default `docker` buildx driver
  # (não docker-container/buildkit) — o que importa porque o buildkit
  # container ignora o `insecure-registries` do daemon.json
  # (basecamp/kamal#937). Docker daemon respeita, push para
  # 192.168.50.53:3030 = localhost-to-localhost sem TLS hacks.
  arch: amd64
  context: .
  dockerfile: apps/web/Dockerfile

accessories:
  postgres:
    image: postgres:17
    roles:
      - web
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: postgres
      secret:
        - POSTGRES_PASSWORD
    files:
      - config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    directories:
      - data:/var/lib/postgresql/data

  cloudflared: &cloudflared
    # host.docker.internal needed para chegar a serviços em outras
    # Docker networks (Gitea em homelab-core publica :3030 no host).
    image: cloudflare/cloudflared:latest
    roles: [web]
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - TUNNEL_TOKEN
    options:
      add-host: host.docker.internal:host-gateway

  # Replica do MESMO tunnel — registra como segundo connector, CF
  # load-balances + failover automático. Sobrevive a crash/update do
  # connector primário sem 502 visível. YAML anchor reusa toda a
  # config do cloudflared primário (sem duplicação).
  cloudflared-replica:
    <<: *cloudflared

  # OTel collector — scrape kamal-proxy Prometheus em :9090 + push
  # OTLP HTTP para OpenObserve. Spans da app (via instrumentation.ts)
  # + proxy metrics convergem no mesmo backend.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    roles: [web]
    cmd: --config=/etc/otelcol-contrib/config.yaml
    env:
      secret:
        - OTEL_AUTH_HEADER
    files:
      - config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    options:
      add-host: host.docker.internal:host-gateway

env:
  clear:
    CORE_BASE_URL: https://core.iedora.com
    CORE_COOKIE_DOMAIN: .iedora.com
    CORE_TRUSTED_ORIGINS: https://iedora.com,https://menu.iedora.com,https://core.iedora.com
    NEXT_PUBLIC_CORE_URL: https://core.iedora.com
    NEXT_PUBLIC_MENU_URL: https://menu.iedora.com
    NEXT_PUBLIC_IMOPUSH_URL: https://imopush.iedora.com
    IEDORA_BOOTSTRAP_ADMIN_EMAILS: eduardoferdcarvalho@gmail.com
    LOG_LEVEL: info
    # OpenObserve corre em homelab-core-infra (rede separada). App
    # chega lá via host.docker.internal — habilitado em options.add-host.
    # OTel: app envia para o collector (mesma rede kamal, resolução
    # por hostname). Collector adiciona auth de OO no egress. App
    # fica sem qualquer secret OTel — single source of truth para
    # auth no collector.
    OTEL_EXPORTER_OTLP_ENDPOINT: http://iedora-web-otel-collector:4318
    # OO admin email — não é secret (email é PII, não auth). O password
    # sim, fica em BWS e é composto em OTEL_EXPORTER_OTLP_HEADERS.
    OPENOBSERVE_ADMIN_EMAIL: eduardoferdcarvalho@gmail.com
    # R2 backend para uploads do menu (logos, banners, QR stickers).
    # Endpoint + region + bucket são deriváveis da conta CF; só as
    # access keys são secret.
    S3_ENDPOINT: https://2716bf6ee8be2880904e70f19050d2ef.r2.cloudflarestorage.com
    S3_REGION: auto
    S3_BUCKET: iedora-assets
  secret:
    - CORE_DATABASE_URL
    - MENU_DATABASE_URL
    - IMOPUSH_DATABASE_URL
    - CORE_SECRET
    - S3_ACCESS_KEY
    - S3_SECRET_KEY
    # Descomenta quando a key existir em BWS:
    # - DEEPSEEK_API_KEY

proxy:
  app_port: 3000
  healthcheck:
    path: /up
    interval: 5
  run:
    http_port: 3001
    # Prometheus-format metrics endpoint, scraped por OTel collector
    # (futuro) para enviar a OpenObserve. Bind interno apenas (não
    # exposto pelo CF tunnel). kamal-proxy >=0.9.1 obrigatório.
    metrics_port: 9090
